function Apostas({ state, setState }) {
  const TIPOS = {
    erro:    { label: 'Erro',           emoji: '❌', cor: 'orange',  border: 'border-orange-400',  bg: 'bg-orange-50' },
    externa: { label: 'Resolução externa', emoji: '📝', cor: 'blue',    border: 'border-blue-400',    bg: 'bg-blue-50' },
    aposta:  { label: 'Aposta de cobrança', emoji: '🎯', cor: 'purple',  border: 'border-purple-400',  bg: 'bg-purple-50' },
  };

  const [novoTipo, setNovoTipo] = useState('externa');
  const [nova, setNova] = useState({
    disciplina: '', grupo: '', bloco: '',
    descricao: '', contexto: '',
    fonte: '', acertou: null,
    motivo: '', confianca_aposta: 'media'
  });
  const [filtroTipo, setFiltroTipo] = useState('TODOS');
  const [filtroDisciplina, setFiltroDisciplina] = useState('TODAS');
  const [filtroAcerto, setFiltroAcerto] = useState('TODOS');

  const limpar = () => setNova({
    disciplina: '', grupo: '', bloco: '',
    descricao: '', contexto: '',
    fonte: '', acertou: null,
    motivo: '', confianca_aposta: 'media'
  });

  const adicionar = () => {
    if (novoTipo === 'externa') {
      if (!nova.fonte.trim()) { alert('Informe a fonte (ex.: FCC TJ-PE 2022 Q.45).'); return; }
      if (nova.acertou === null) { alert('Marque acerto ou erro.'); return; }
    } else if (novoTipo === 'aposta') {
      if (!nova.descricao.trim()) { alert('Descreva o ponto da aposta.'); return; }
    } else {
      if (!nova.descricao.trim()) { alert('Descreva o erro.'); return; }
    }
    const grupoInfo = nova.grupo && DADOS.conteudo[nova.grupo];
    const disciplinaFinal = nova.disciplina || (grupoInfo ? grupoInfo.disciplina : '');
    const entrada = {
      id: Date.now(), data: hoje(),
      tipo: novoTipo, origem: 'manual',
      disciplina: disciplinaFinal,
      grupo: nova.grupo || null,
      bloco: nova.bloco || null,
      descricao: nova.descricao,
      ...(novoTipo === 'externa' && { fonte: nova.fonte, acertou: nova.acertou, contexto: nova.contexto }),
      ...(novoTipo === 'aposta' && { motivo: nova.motivo, confianca_aposta: nova.confianca_aposta }),
      ...(novoTipo === 'erro' && { contexto: nova.contexto, fonte: nova.fonte }),
    };
    setState(s => ({ ...s, apostas_erros: [...s.apostas_erros, entrada] }));
    limpar();
  };

  const excluir = (id) => {
    if (!confirm('Excluir esta entrada?')) return;
    setState(s => ({ ...s, apostas_erros: s.apostas_erros.filter(e => e.id !== id) }));
  };

  // Métricas
  const total = state.apostas_erros.length;
  const externas = state.apostas_erros.filter(e => e.tipo === 'externa');
  const externasAcerto = externas.filter(e => e.acertou).length;
  const pctAcertoExt = externas.length ? Math.round(externasAcerto / externas.length * 100) : 0;
  const erros = state.apostas_erros.filter(e => e.tipo === 'erro').length;
  const apostas = state.apostas_erros.filter(e => e.tipo === 'aposta').length;

  // Filtragem
  const filtradas = state.apostas_erros.filter(e => {
    if (filtroTipo !== 'TODOS' && e.tipo !== filtroTipo) return false;
    if (filtroDisciplina !== 'TODAS' && e.disciplina !== filtroDisciplina) return false;
    if (filtroAcerto === 'ACERTO' && !(e.tipo === 'externa' && e.acertou)) return false;
    if (filtroAcerto === 'ERRO_EXT' && !(e.tipo === 'externa' && !e.acertou)) return false;
    return true;
  }).sort((a,b) => b.id - a.id);

  const disciplinasNaLista = [...new Set(state.apostas_erros.map(e => e.disciplina).filter(Boolean))];
  const grupoSel = nova.grupo && DADOS.conteudo[nova.grupo];

  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">🔥 Quadro de Apostas e Erros</h2>
      <p className="text-slate-500 mb-5">Erros para revisar, questões resolvidas fora do app e apostas do que vai cair na prova.</p>

      {/* Métricas */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <div className="bg-white rounded-lg border border-slate-200 p-3">
          <div className="text-xs text-slate-500">Total</div>
          <div className="text-2xl font-bold text-slate-800">{total}</div>
        </div>
        <div className="bg-orange-50 rounded-lg border border-orange-200 p-3">
          <div className="text-xs text-orange-700">Erros para revisar</div>
          <div className="text-2xl font-bold text-orange-900">{erros}</div>
        </div>
        <div className="bg-blue-50 rounded-lg border border-blue-200 p-3">
          <div className="text-xs text-blue-700">Externas resolvidas</div>
          <div className="text-2xl font-bold text-blue-900">{externas.length}</div>
          {externas.length > 0 && <div className="text-[11px] text-blue-700">{pctAcertoExt}% acerto · {externasAcerto}/{externas.length}</div>}
        </div>
        <div className="bg-purple-50 rounded-lg border border-purple-200 p-3">
          <div className="text-xs text-purple-700">Apostas</div>
          <div className="text-2xl font-bold text-purple-900">{apostas}</div>
        </div>
      </div>

      {/* Formulário */}
      <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-5">
        <h3 className="font-bold text-slate-800 mb-3">Nova entrada</h3>
        <div className="flex gap-2 mb-4 flex-wrap">
          {Object.entries(TIPOS).map(([tid, t]) => (
            <button key={tid} onClick={() => { setNovoTipo(tid); limpar(); }}
              className={`px-3 py-1.5 text-xs font-semibold rounded-lg border-2 ${novoTipo === tid ? 'border-emerald-500 bg-emerald-50 text-emerald-800' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-400'}`}>
              {t.emoji} {t.label}
            </button>
          ))}
        </div>

        {/* Disciplina/Bloco (comum) */}
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
          <select value={nova.grupo} onChange={e=>setNova({...nova, grupo:e.target.value, bloco:'', disciplina: e.target.value ? DADOS.conteudo[e.target.value]?.disciplina || '' : nova.disciplina})}
            className="border rounded px-3 py-2 text-sm ring-focus">
            <option value="">Disciplina (grupo)</option>
            {Object.entries(DADOS.conteudo).map(([gid, g]) => <option key={gid} value={gid}>{gid} · {g.disciplina}</option>)}
          </select>
          <select value={nova.bloco} onChange={e=>setNova({...nova, bloco:e.target.value})} className="border rounded px-3 py-2 text-sm ring-focus" disabled={!grupoSel}>
            <option value="">Bloco (opcional)</option>
            {grupoSel && grupoSel.blocos.map(b => <option key={b.codigo} value={b.codigo}>{b.codigo} · {b.titulo.substring(0, 40)}{b.titulo.length > 40 ? '…' : ''}</option>)}
          </select>
          {novoTipo === 'externa' && (
            <input type="text" value={nova.fonte} onChange={e=>setNova({...nova, fonte:e.target.value})}
              placeholder="Fonte: FCC TJ-PE 2022 Q.45" className="border rounded px-3 py-2 text-sm ring-focus"/>
          )}
          {novoTipo === 'erro' && (
            <input type="text" value={nova.fonte} onChange={e=>setNova({...nova, fonte:e.target.value})}
              placeholder="Fonte (opcional)" className="border rounded px-3 py-2 text-sm ring-focus"/>
          )}
          {novoTipo === 'aposta' && (
            <select value={nova.confianca_aposta} onChange={e=>setNova({...nova, confianca_aposta:e.target.value})}
              className="border rounded px-3 py-2 text-sm ring-focus">
              <option value="alta">Confiança alta</option>
              <option value="media">Confiança média</option>
              <option value="baixa">Confiança baixa</option>
            </select>
          )}
        </div>

        {/* Campos específicos */}
        {novoTipo === 'externa' && (
          <div className="mb-3">
            <label className="text-xs font-semibold text-slate-600 mb-1 block">Resultado:</label>
            <div className="flex gap-2">
              <button type="button" onClick={() => setNova({...nova, acertou: true})}
                className={`px-3 py-1.5 text-xs rounded-lg border-2 ${nova.acertou === true ? 'border-emerald-500 bg-emerald-100 text-emerald-800 font-semibold' : 'border-slate-200 bg-white text-slate-600'}`}>
                ✓ Acertei
              </button>
              <button type="button" onClick={() => setNova({...nova, acertou: false})}
                className={`px-3 py-1.5 text-xs rounded-lg border-2 ${nova.acertou === false ? 'border-red-500 bg-red-100 text-red-800 font-semibold' : 'border-slate-200 bg-white text-slate-600'}`}>
                ✗ Errei
              </button>
            </div>
          </div>
        )}

        <textarea value={novoTipo === 'aposta' ? nova.motivo : nova.descricao}
          onChange={e=>setNova(novoTipo === 'aposta' ? {...nova, motivo:e.target.value, descricao: e.target.value} : {...nova, descricao:e.target.value})}
          rows="3"
          placeholder={
            novoTipo === 'externa' ? 'Comentário/aprendizado da questão (o que errou, por quê, qual o instituto chave).'
            : novoTipo === 'aposta' ? 'O que acha que vai cair e por quê (ex.: súmula vinc. 14, citada 3x em TJs recentes).'
            : 'Descreva o erro objetivamente (premissa equivocada, regra esquecida, distinção não captada).'
          }
          className="w-full border rounded px-3 py-2 text-sm ring-focus"/>

        {(novoTipo === 'externa' || novoTipo === 'erro') && (
          <input type="text" value={nova.contexto} onChange={e=>setNova({...nova, contexto:e.target.value})}
            placeholder="Contexto/tópico (palavras-chave para localizar depois)"
            className="mt-2 w-full border rounded px-3 py-2 text-sm ring-focus"/>
        )}

        <div className="mt-3 flex justify-end gap-2">
          <button onClick={limpar} className="px-3 py-2 text-sm bg-slate-100 text-slate-600 rounded hover:bg-slate-200">Limpar</button>
          <button onClick={adicionar} className="px-4 py-2 text-sm bg-emerald-600 text-white rounded hover:bg-emerald-700 font-semibold">
            + Adicionar {TIPOS[novoTipo].label.toLowerCase()}
          </button>
        </div>
      </div>

      {/* Filtros */}
      {total > 0 && (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 mb-4 flex flex-wrap gap-3 items-center">
          <div className="flex items-center gap-2">
            <label className="text-xs font-semibold text-slate-600">Tipo:</label>
            <select value={filtroTipo} onChange={e => setFiltroTipo(e.target.value)} className="text-sm border rounded px-2 py-1 ring-focus">
              <option value="TODOS">Todos</option>
              <option value="erro">Erros</option>
              <option value="externa">Externas</option>
              <option value="aposta">Apostas</option>
            </select>
          </div>
          <div className="flex items-center gap-2">
            <label className="text-xs font-semibold text-slate-600">Disciplina:</label>
            <select value={filtroDisciplina} onChange={e => setFiltroDisciplina(e.target.value)} className="text-sm border rounded px-2 py-1 ring-focus">
              <option value="TODAS">Todas</option>
              {disciplinasNaLista.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div className="flex items-center gap-2">
            <label className="text-xs font-semibold text-slate-600">Externas:</label>
            <select value={filtroAcerto} onChange={e => setFiltroAcerto(e.target.value)} className="text-sm border rounded px-2 py-1 ring-focus">
              <option value="TODOS">Todas</option>
              <option value="ACERTO">Apenas acertos</option>
              <option value="ERRO_EXT">Apenas erros</option>
            </select>
          </div>
          <div className="ml-auto text-xs text-slate-500">{filtradas.length} de {total}</div>
        </div>
      )}

      {/* Lista */}
      {total === 0 ? (
        <div className="bg-white rounded-xl p-6 text-center text-slate-500">
          Nenhuma entrada ainda. Use o formulário acima para registrar erros, resoluções externas ou apostas de cobrança.
        </div>
      ) : filtradas.length === 0 ? (
        <div className="bg-white rounded-xl p-6 text-center text-slate-500">Nenhuma entrada bate com os filtros.</div>
      ) : (
        <div className="space-y-2">
          {filtradas.map(e => {
            const t = TIPOS[e.tipo] || TIPOS.erro;
            return (
              <div key={e.id} className={`border-l-4 ${t.border} pl-3 py-2.5 ${t.bg} rounded-r flex items-start justify-between gap-3`}>
                <div className="flex-1 min-w-0">
                  <div className="flex flex-wrap items-center gap-2 text-[11px] mb-1">
                    <span className="font-semibold text-slate-700">{t.emoji} {t.label}</span>
                    {e.disciplina && <span className="px-2 py-0.5 bg-white rounded border border-slate-200 text-slate-700">{e.disciplina}</span>}
                    {e.bloco && <span className="px-2 py-0.5 bg-white rounded border border-slate-200 text-slate-700">{e.grupo || ''}{e.grupo ? '·' : ''}{e.bloco}</span>}
                    {e.tipo === 'externa' && (
                      <span className={`px-2 py-0.5 rounded font-semibold ${e.acertou ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'}`}>
                        {e.acertou ? '✓ Acertou' : '✗ Errou'}
                      </span>
                    )}
                    {e.tipo === 'aposta' && e.confianca_aposta && (
                      <span className="px-2 py-0.5 bg-purple-100 text-purple-800 rounded">conf. {e.confianca_aposta}</span>
                    )}
                    {e.fonte && <span className="text-slate-500">📚 {e.fonte}</span>}
                    {e.origem === 'banco_interno' && <span className="text-[10px] text-slate-400">(banco interno)</span>}
                  </div>
                  <div className="text-sm text-slate-800 break-words">{e.descricao || e.erro || '(sem descrição)'}</div>
                  {e.contexto && <div className="text-xs text-slate-500 mt-1">📌 {e.contexto}</div>}
                  <div className="text-[10px] text-slate-400 mt-1">{fmtData(e.data)}</div>
                </div>
                <button onClick={() => excluir(e.id)} className="text-slate-400 hover:text-red-600 p-1 flex-shrink-0" title="Excluir">
                  <Icon name="trash" className="w-4 h-4"/>
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ===================== FOCO =====================
function Foco({ state, setState }) {
  const [modo, setModo] = useState('foco');
  const [duracao, setDuracao] = useState(25 * 60);
  const [restante, setRestante] = useState(25 * 60);
  const [rodando, setRodando] = useState(false);
  const [contador, setContador] = useState(0);
  useEffect(() => {
    if (!rodando) return;
    const t = setInterval(() => {
      setRestante(r => {
        if (r <= 1) {
          const novoModo = modo === 'foco' ? 'pausa' : 'foco';
          const novaDuracao = novoModo === 'foco' ? 25 * 60 : 5 * 60;
          setModo(novoModo); setDuracao(novaDuracao);
          if (modo === 'foco') {
            setContador(c => c + 1);
            setState(s => ({...s, pomodoro: {ciclos_total: (s.pomodoro?.ciclos_total||0) + 1, focos_minutos: (s.pomodoro?.focos_minutos||0) + 25}}));
          }
          return novaDuracao;
        }
        return r - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [rodando, modo]);
  const reset = () => { setRodando(false); const d = modo === 'foco' ? 25*60 : 5*60; setDuracao(d); setRestante(d); };
  const mm = String(Math.floor(restante/60)).padStart(2,'0');
  const ss = String(restante%60).padStart(2,'0');
  const pct = ((duracao - restante) / duracao) * 100;
  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">⏱️ Foco / Pomodoro</h2>
      <p className="text-slate-500 mb-5">25min foco + 5min pausa.</p>
      <div className={`rounded-2xl p-8 text-center text-white shadow-xl mb-6 ${modo === 'foco' ? 'bg-gradient-to-br from-emerald-600 to-emerald-800' : 'bg-gradient-to-br from-sky-500 to-blue-700'}`}>
        <div className="text-sm uppercase tracking-widest opacity-90 mb-2">{modo === 'foco' ? '🎯 FOCO' : '☕ PAUSA'}</div>
        <div className="text-7xl font-mono font-bold mb-4">{mm}:{ss}</div>
        <div className="w-full bg-white/20 rounded-full h-2 mb-6 max-w-md mx-auto overflow-hidden"><div className="h-full bg-white transition-all" style={{width: `${pct}%`}}/></div>
        <div className="flex justify-center gap-3">
          <button onClick={() => setRodando(r => !r)} className="px-6 py-3 bg-white text-slate-800 font-bold rounded-lg flex items-center gap-2">
            <Icon name={rodando ? 'pause' : 'play'} className="w-5 h-5"/>{rodando ? 'Pausar' : 'Iniciar'}
          </button>
          <button onClick={reset} className="px-6 py-3 bg-white/20 hover:bg-white/30 text-white rounded-lg flex items-center gap-2"><Icon name="reset" className="w-5 h-5"/></button>
        </div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div className="bg-white rounded-xl border p-4"><div className="text-xs text-slate-500 uppercase">Ciclos esta sessão</div><div className="text-3xl font-bold text-emerald-700">{contador}</div></div>
        <div className="bg-white rounded-xl border p-4"><div className="text-xs text-slate-500 uppercase">Ciclos totais</div><div className="text-3xl font-bold text-emerald-700">{state.pomodoro?.ciclos_total || 0}</div></div>
        <div className="bg-white rounded-xl border p-4"><div className="text-xs text-slate-500 uppercase">Minutos focados</div><div className="text-3xl font-bold text-emerald-700">{state.pomodoro?.focos_minutos || 0}</div></div>
      </div>
      <div className="mt-6 bg-amber-50 border border-amber-300 rounded-xl p-4 text-sm text-amber-900">
        <strong>💡 Sugestão:</strong> Ciclo 1 = 3 pomodoros · Ciclo 2 = 1 pomodoro · Ciclo 3 = 2 pomodoros. Total: 6 pomodoros/dia.
      </div>
    </div>
  );
}

// ===================== REVISÃO ESPAÇADA (SRS) =====================
// Algoritmo: 5 níveis (0..4). Errou volta a 0; Difícil mantém; Fácil sobe.
// Intervalos: nível 0 → +1d, 1 → +3d, 2 → +7d, 3 → +21d, 4 → +60d.
const SRS_INTERVALOS = [1, 3, 7, 21, 60];

function dataMaisDias(dias) {
  const d = new Date(); d.setDate(d.getDate() + dias);
  return d.toISOString().split('T')[0];
}
function diasEntre(isoA, isoB) {
  return Math.floor((new Date(isoB) - new Date(isoA)) / 86400000);
}

function Revisao({ state, setState }) {
  const [aba, setAba] = useState('revisar'); // revisar | criar | todos
  const [grupoSel, setGrupoSel] = useState('G1');
  const [blocoSel, setBlocoSel] = useState('B1');
  const [frente, setFrente] = useState('');
  const [verso, setVerso] = useState('');
  const [modoEdicao, setModoEdicao] = useState(null); // id do card sendo editado
  const [revelado, setRevelado] = useState(false);
  const [indexAtual, setIndexAtual] = useState(0);

  const cards = state.flashcards || [];
  const hojeStr = hoje();
  const devidos = useMemo(() =>
    cards.filter(c => !c.proxima_revisao || c.proxima_revisao <= hojeStr),
    [cards, hojeStr]
  );

  const criarCard = () => {
    if (!frente.trim() || !verso.trim()) { alert('Preencha frente e verso do card.'); return; }
    const novo = {
      id: Date.now() + Math.random(),
      grupo: grupoSel, bloco: blocoSel,
      frente: frente.trim(), verso: verso.trim(),
      criado: hojeStr,
      proxima_revisao: hojeStr, // revisar hoje
      nivel: 0,
      revisoes: [],
    };
    setState(s => ({ ...s, flashcards: [...(s.flashcards || []), novo] }));
    setFrente(''); setVerso('');
  };

  const salvarEdicao = (id) => {
    if (!frente.trim() || !verso.trim()) return;
    setState(s => ({ ...s,
      flashcards: s.flashcards.map(c => c.id === id ? { ...c, frente: frente.trim(), verso: verso.trim() } : c)
    }));
    setModoEdicao(null); setFrente(''); setVerso('');
  };

  const excluirCard = (id) => {
    if (!confirm('Excluir este flashcard?')) return;
    setState(s => ({ ...s, flashcards: s.flashcards.filter(c => c.id !== id) }));
  };

  const avaliar = (qualidade) => {
    if (devidos.length === 0) return;
    const card = devidos[indexAtual];
    let novoNivel = card.nivel ?? 0;
    if (qualidade === 'erro') novoNivel = 0;
    else if (qualidade === 'dificil') novoNivel = novoNivel; // mantém
    else if (qualidade === 'facil') novoNivel = Math.min(SRS_INTERVALOS.length - 1, novoNivel + 1);
    const novaProx = dataMaisDias(SRS_INTERVALOS[novoNivel]);
    setState(s => ({ ...s,
      flashcards: s.flashcards.map(c => c.id === card.id ? {
        ...c, nivel: novoNivel, proxima_revisao: novaProx,
        revisoes: [...(c.revisoes || []), { data: hojeStr, qualidade }]
      } : c)
    }));
    setRevelado(false);
    if (indexAtual >= devidos.length - 1) { setIndexAtual(0); }
    // (a lista 'devidos' será recalculada no próximo render via useMemo)
  };

  const grupo = DADOS.conteudo[grupoSel];
  const editingCard = cards.find(c => c.id === modoEdicao);

  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">🧠 Revisão Espaçada</h2>
      <p className="text-slate-500 mb-2">Flashcards com intervalos crescentes (1d → 3d → 7d → 21d → 60d). Combata a curva do esquecimento.</p>
      <p className="text-xs text-slate-400 mb-5 italic">Crie cards curtos a partir das suas Anotações. Ideal: pergunta direta na frente, resposta objetiva no verso.</p>

      <div className="flex gap-2 border-b border-slate-200 mb-5">
        {[
          { id: 'revisar', label: `Revisar (${devidos.length})` },
          { id: 'criar', label: 'Criar card' },
          { id: 'todos', label: `Todos (${cards.length})` },
        ].map(t => (
          <button key={t.id} onClick={() => { setAba(t.id); setRevelado(false); setIndexAtual(0); }}
            className={`px-4 py-2 text-sm font-medium border-b-2 transition ${aba === t.id ? 'border-emerald-600 text-emerald-700' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
            {t.label}
          </button>
        ))}
      </div>

      {aba === 'revisar' && (() => {
        if (cards.length === 0) {
          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center">
              <p className="text-slate-600 mb-3">Você ainda não criou nenhum flashcard.</p>
              <button onClick={() => setAba('criar')} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">
                Criar primeiro card
              </button>
            </div>
          );
        }
        if (devidos.length === 0) {
          const proximaData = cards.map(c => c.proxima_revisao).filter(Boolean).sort()[0];
          return (
            <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-8 text-center">
              <p className="text-emerald-800 font-semibold mb-1">✓ Nada para revisar hoje!</p>
              <p className="text-sm text-emerald-700">Próxima revisão: {proximaData ? fmtData(proximaData) : '—'}</p>
            </div>
          );
        }
        const card = devidos[Math.min(indexAtual, devidos.length - 1)];
        const grupoCard = DADOS.conteudo[card.grupo];
        return (
          <div>
            <div className="flex items-center justify-between mb-3 text-xs">
              <span className="text-slate-500">Card {Math.min(indexAtual, devidos.length - 1) + 1} de {devidos.length}</span>
              <div className="flex gap-2 items-center">
                <span className="px-2 py-0.5 bg-slate-100 rounded">{grupoCard?.disciplina || card.grupo}</span>
                <span className="px-2 py-0.5 bg-slate-100 rounded">{card.bloco}</span>
                <span className="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded">Nível {card.nivel ?? 0}</span>
              </div>
            </div>
            <div className="bg-white rounded-xl shadow-sm border-2 border-slate-200 p-8 min-h-[200px] flex items-center justify-center mb-4">
              <div className="w-full">
                <div className="text-[11px] uppercase tracking-wide text-slate-400 mb-2 text-center">Frente</div>
                <p className="text-lg text-slate-800 text-center whitespace-pre-wrap">{card.frente}</p>
                {revelado && (
                  <>
                    <hr className="my-5 border-slate-200"/>
                    <div className="text-[11px] uppercase tracking-wide text-emerald-600 mb-2 text-center">Verso</div>
                    <p className="text-base text-slate-700 text-center whitespace-pre-wrap">{card.verso}</p>
                  </>
                )}
              </div>
            </div>
            {!revelado ? (
              <button onClick={() => setRevelado(true)} className="w-full py-3 bg-slate-800 text-white rounded-lg font-semibold hover:bg-slate-900">
                Revelar resposta
              </button>
            ) : (
              <div className="grid grid-cols-3 gap-2">
                <button onClick={() => avaliar('erro')} className="py-3 bg-red-100 text-red-800 rounded-lg font-semibold hover:bg-red-200 border-2 border-red-300">
                  ❌ Errei<br/><span className="text-[11px] font-normal">revisar em 1d</span>
                </button>
                <button onClick={() => avaliar('dificil')} className="py-3 bg-amber-100 text-amber-800 rounded-lg font-semibold hover:bg-amber-200 border-2 border-amber-300">
                  😐 Difícil<br/><span className="text-[11px] font-normal">mantém nível {card.nivel ?? 0}</span>
                </button>
                <button onClick={() => avaliar('facil')} className="py-3 bg-emerald-100 text-emerald-800 rounded-lg font-semibold hover:bg-emerald-200 border-2 border-emerald-300">
                  ✓ Fácil<br/><span className="text-[11px] font-normal">+{SRS_INTERVALOS[Math.min(SRS_INTERVALOS.length - 1, (card.nivel ?? 0) + 1)]}d</span>
                </button>
              </div>
            )}
          </div>
        );
      })()}

      {aba === 'criar' && (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <h3 className="font-bold text-slate-800 mb-3">{editingCard ? 'Editar card' : 'Novo flashcard'}</h3>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label className="text-xs font-semibold text-slate-600 mb-1 block">Disciplina</label>
              <select value={grupoSel} onChange={e => { setGrupoSel(e.target.value); setBlocoSel('B1'); }}
                className="w-full border rounded px-2 py-2 text-sm">
                {Object.entries(DADOS.conteudo).map(([gid, g]) => <option key={gid} value={gid}>{gid} · {g.disciplina}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs font-semibold text-slate-600 mb-1 block">Bloco</label>
              <select value={blocoSel} onChange={e => setBlocoSel(e.target.value)} className="w-full border rounded px-2 py-2 text-sm">
                {grupo.blocos.map(b => <option key={b.codigo} value={b.codigo}>{b.codigo}</option>)}
              </select>
            </div>
          </div>
          <div className="mb-3">
            <label className="text-xs font-semibold text-slate-600 mb-1 block">Frente (pergunta)</label>
            <textarea value={frente} onChange={e => setFrente(e.target.value)} rows="3"
              placeholder="Ex.: Prazo para impetrar MS?"
              className="w-full border rounded-lg px-3 py-2 text-sm ring-focus"/>
          </div>
          <div className="mb-3">
            <label className="text-xs font-semibold text-slate-600 mb-1 block">Verso (resposta)</label>
            <textarea value={verso} onChange={e => setVerso(e.target.value)} rows="3"
              placeholder="Ex.: 120 dias (decadencial) — Lei 12.016/2009 art. 23"
              className="w-full border rounded-lg px-3 py-2 text-sm ring-focus"/>
          </div>
          <div className="flex gap-2">
            {editingCard ? (
              <>
                <button onClick={() => salvarEdicao(editingCard.id)}
                  className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">Salvar edição</button>
                <button onClick={() => { setModoEdicao(null); setFrente(''); setVerso(''); }}
                  className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm hover:bg-slate-200">Cancelar</button>
              </>
            ) : (
              <button onClick={criarCard}
                className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">+ Criar card</button>
            )}
          </div>
        </div>
      )}

      {aba === 'todos' && (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <h3 className="font-bold text-slate-800 mb-3">Todos os flashcards</h3>
          {cards.length === 0 ? (
            <p className="text-sm text-slate-500">Nenhum card criado ainda.</p>
          ) : (
            <div className="space-y-2 max-h-[600px] overflow-y-auto scroll-thin">
              {[...cards].sort((a,b) => (a.proxima_revisao || '').localeCompare(b.proxima_revisao || '')).map(c => {
                const g = DADOS.conteudo[c.grupo];
                const atrasado = c.proxima_revisao && c.proxima_revisao < hojeStr;
                const hoje_ = c.proxima_revisao === hojeStr;
                return (
                  <div key={c.id} className="border rounded-lg p-3 text-sm flex items-start gap-3">
                    <div className="flex-1">
                      <div className="flex flex-wrap items-center gap-2 text-xs mb-1">
                        <span className="px-2 py-0.5 bg-slate-100 rounded">{g?.disciplina || c.grupo} · {c.bloco}</span>
                        <span className="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded">N{c.nivel ?? 0}</span>
                        <span className={`px-2 py-0.5 rounded text-[11px] ${atrasado ? 'bg-red-100 text-red-700' : hoje_ ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>
                          {atrasado ? 'Atrasado' : hoje_ ? 'Hoje' : 'em ' + fmtData(c.proxima_revisao)}
                        </span>
                        <span className="text-slate-400 text-[11px]">{(c.revisoes || []).length} revisões</span>
                      </div>
                      <p className="text-slate-800"><strong>F:</strong> {c.frente}</p>
                      <p className="text-slate-600 mt-1"><strong>V:</strong> {c.verso}</p>
                    </div>
                    <div className="flex flex-col gap-1">
                      <button onClick={() => { setModoEdicao(c.id); setFrente(c.frente); setVerso(c.verso); setGrupoSel(c.grupo); setBlocoSel(c.bloco); setAba('criar'); }}
                        className="p-1.5 text-slate-500 hover:text-emerald-700 hover:bg-emerald-50 rounded" title="Editar">
                        <Icon name="edit" className="w-3.5 h-3.5"/>
                      </button>
                      <button onClick={() => excluirCard(c.id)}
                        className="p-1.5 text-slate-500 hover:text-red-700 hover:bg-red-50 rounded" title="Excluir">
                        <Icon name="trash" className="w-3.5 h-3.5"/>
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ===================== BACKUP / EXPORT / IMPORT =====================
function Backup({ state, setState, persistStatus, syncStatus, setSyncStatus }) {
  const fileRef = useRef(null);
  const [mensagem, setMensagem] = useState(null);
  const [snapshots, setSnapshots] = useState([]);
  const [estimativa, setEstimativa] = useState(null);
  const [carregandoSnap, setCarregandoSnap] = useState(false);
  const [statusPasta, setStatusPasta] = useState(null); // { conectada, permissao, nome }
  const [carregandoSync, setCarregandoSync] = useState(false);

  // Carregar snapshots, estimativa e status da pasta sync ao abrir a tela
  useEffect(() => {
    let ativo = true;
    (async () => {
      const [snaps, est, sp] = await Promise.all([listarSnapshots(), estimarStorage(), statusPastaSync()]);
      if (!ativo) return;
      setSnapshots(snaps);
      setEstimativa(est);
      setStatusPasta(sp);
    })();
    return () => { ativo = false; };
  }, [state]);

  const compartilhar = async () => {
    try {
      const r = await compartilharBackup(state);
      if (r.ok) {
        setState(s => ({ ...s, ultimo_backup: new Date().toISOString() }));
        setMensagem({ tipo: 'ok', texto: '✓ Compartilhamento concluído. Guarde o arquivo em local seguro.' });
      } else if (r.motivo === 'sem_arquivo') {
        setMensagem({ tipo: 'erro', texto: '✗ Este navegador não permite compartilhar arquivos. Use Exportar para baixar.' });
      } else {
        setMensagem({ tipo: 'erro', texto: '✗ Web Share não disponível neste dispositivo. Use Exportar.' });
      }
    } catch(e) {
      if (e.name === 'AbortError') return; // usuário cancelou
      setMensagem({ tipo: 'erro', texto: '✗ Erro ao compartilhar: ' + e.message });
    }
  };

  const conectarPasta = async () => {
    setCarregandoSync(true);
    try {
      const handle = await conectarPastaSync();
      const sp = await statusPastaSync();
      setStatusPasta(sp);
      // Grava o primeiro backup imediatamente
      const r = await gravarBackupNaPastaSync(state);
      if (r.ok) {
        setSyncStatus({ ok: true, ultimo: r.timestamp, pasta: handle.name });
        setMensagem({ tipo: 'ok', texto: `✓ Pasta "${handle.name}" conectada. Backup automático ativo. Dica: escolha uma pasta sincronizada com Google Drive Desktop, iCloud Drive ou OneDrive para que o arquivo vá automaticamente para a nuvem.` });
      } else {
        setMensagem({ tipo: 'ok', texto: `✓ Pasta "${handle.name}" conectada, mas houve falha na primeira gravação: ${r.motivo}` });
      }
    } catch(e) {
      if (e.name === 'AbortError') return; // usuário cancelou seletor
      setMensagem({ tipo: 'erro', texto: '✗ ' + e.message });
    } finally {
      setCarregandoSync(false);
    }
  };
  const desconectarPasta = async () => {
    if (!confirm('Desconectar a pasta de sincronização? O arquivo já gravado nela não será apagado, mas as próximas alterações no app não serão mais sincronizadas automaticamente.')) return;
    await desconectarPastaSync();
    setStatusPasta({ conectada: false });
    setSyncStatus(null);
    setMensagem({ tipo: 'ok', texto: '✓ Pasta desconectada.' });
  };
  const reautorizarPasta = async () => {
    setCarregandoSync(true);
    try {
      const r = await pedirPermissaoPastaSync();
      const sp = await statusPastaSync();
      setStatusPasta(sp);
      if (r === 'granted') {
        const w = await gravarBackupNaPastaSync(state);
        if (w.ok) setSyncStatus({ ok: true, ultimo: w.timestamp, pasta: sp.nome });
        setMensagem({ tipo: 'ok', texto: '✓ Permissão renovada.' });
      } else {
        setMensagem({ tipo: 'erro', texto: '✗ Permissão não concedida.' });
      }
    } catch(e) {
      setMensagem({ tipo: 'erro', texto: '✗ ' + e.message });
    } finally {
      setCarregandoSync(false);
    }
  };
  const forcarSync = async () => {
    setCarregandoSync(true);
    const r = await gravarBackupNaPastaSync(state, { solicitar: true });
    if (r.ok) {
      setSyncStatus({ ok: true, ultimo: r.timestamp, pasta: statusPasta?.nome });
      setState(s => ({ ...s, ultimo_backup: new Date().toISOString() }));
      setMensagem({ tipo: 'ok', texto: '✓ Backup gravado na pasta.' });
    } else {
      setMensagem({ tipo: 'erro', texto: '✗ Falha ao gravar: ' + (r.motivo || 'desconhecido') });
    }
    setCarregandoSync(false);
  };

  const exportar = () => {
    const payload = {
      __app__: 'tjce_centro_estudos',
      __versao__: state.versao || 4,
      __exportado_em__: new Date().toISOString(),
      estado: { ...state, ultimo_backup: new Date().toISOString() }
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
    const nomeSlug = (state.nome_candidato || 'candidato').toLowerCase().replace(/[^a-z0-9]/g, '_').substring(0, 20);
    a.href = url;
    a.download = `tjce_backup_${nomeSlug}_${stamp}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    setState(s => ({ ...s, ultimo_backup: new Date().toISOString() }));
    setMensagem({ tipo: 'ok', texto: '✓ Backup exportado. Guarde o arquivo em local seguro (Drive, e-mail, pendrive).' });
  };

  const importar = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const dados = JSON.parse(ev.target.result);
        if (dados.__app__ !== 'tjce_centro_estudos' || !dados.estado) {
          setMensagem({ tipo: 'erro', texto: '✗ Arquivo inválido. Não parece um backup deste app.' });
          return;
        }
        if (!confirm('Substituir TODOS os dados atuais pelos do backup? Esta ação é irreversível. Recomendação: exportar o estado atual antes.')) return;
        const novo = migrarEstado(dados.estado);
        setState(novo);
        setMensagem({ tipo: 'ok', texto: `✓ Backup restaurado (exportado em ${new Date(dados.__exportado_em__).toLocaleString('pt-BR')}).` });
      } catch (err) {
        setMensagem({ tipo: 'erro', texto: '✗ Erro ao ler arquivo: ' + err.message });
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const resetar = () => {
    if (!confirm('APAGAR TODOS os dados (progresso, notas, redações, flashcards, simulados)? Não há como desfazer.')) return;
    if (!confirm('Última confirmação: tem certeza absoluta?')) return;
    setState(defaultState());
    setMensagem({ tipo: 'ok', texto: '✓ Dados zerados.' });
  };

  // Estatísticas do estado
  const stats = {
    cronograma: Object.keys(state.cronograma_status || {}).length,
    questoes: Object.keys(state.questoes_estado || {}).length,
    flashcards: (state.flashcards || []).length,
    notas: Object.keys(state.notas || {}).filter(k => state.notas[k]?.trim()).length,
    redacoes: (state.redacoes || []).length,
    simulados: (state.simulados || []).length,
    apostas: (state.apostas_erros || []).length,
  };

  const ub = state.ultimo_backup;
  const diasSemBackup = ub ? Math.floor((new Date() - new Date(ub)) / 86400000) : null;

  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">💾 Backup & Dados</h2>
      <p className="text-slate-500 mb-5">Exporte seu progresso para arquivo JSON. Sem backup, uma limpeza de cache do navegador apaga tudo.</p>

      {mensagem && (
        <div className={`mb-4 p-3 rounded-lg border text-sm ${mensagem.tipo === 'ok' ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : 'bg-red-50 border-red-300 text-red-800'}`}>
          {mensagem.texto}
        </div>
      )}

      <div className={`mb-5 p-4 rounded-lg border ${ub && diasSemBackup < 7 ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-300'}`}>
        <div className="flex items-center gap-2 mb-1">
          <Icon name={ub && diasSemBackup < 7 ? 'check' : 'alert'} className={`w-5 h-5 ${ub && diasSemBackup < 7 ? 'text-emerald-700' : 'text-red-700'}`}/>
          <strong className={ub && diasSemBackup < 7 ? 'text-emerald-800' : 'text-red-800'}>
            {ub ? `Último backup: ${new Date(ub).toLocaleString('pt-BR')}` : 'Você ainda não fez backup'}
          </strong>
        </div>
        {ub && (
          <p className={`text-xs ${diasSemBackup < 7 ? 'text-emerald-700' : 'text-red-700'}`}>
            {diasSemBackup === 0 ? 'Feito hoje.' : `${diasSemBackup} dia${diasSemBackup > 1 ? 's' : ''} atrás.`}
            {diasSemBackup >= 7 && ' Faça um novo agora — risco real de perda.'}
          </p>
        )}
        {!ub && <p className="text-xs text-red-700">Recomendação: exporte agora e refaça o backup ao menos a cada 3 dias.</p>}
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <Icon name="download" className="w-8 h-8 text-emerald-600 mb-2"/>
          <h3 className="font-bold text-slate-800 mb-1">Exportar JSON</h3>
          <p className="text-xs text-slate-500 mb-3">Baixa um arquivo com tudo: progresso, notas, redações, flashcards, simulados.</p>
          <button onClick={exportar} className="w-full px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700 font-semibold">
            Baixar backup
          </button>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <Icon name="upload" className="w-8 h-8 text-blue-600 mb-2"/>
          <h3 className="font-bold text-slate-800 mb-1">Importar JSON</h3>
          <p className="text-xs text-slate-500 mb-3">Substitui o estado atual pelo conteúdo do arquivo. Confirma antes.</p>
          <input ref={fileRef} type="file" accept="application/json" onChange={importar} className="hidden"/>
          <button onClick={() => fileRef.current?.click()} className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 font-semibold">
            Escolher arquivo
          </button>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <Icon name="upload" className="w-8 h-8 text-indigo-600 mb-2 rotate-180"/>
          <h3 className="font-bold text-slate-800 mb-1">Compartilhar</h3>
          <p className="text-xs text-slate-500 mb-3">Envia o backup pelo menu nativo (iCloud, Mail, AirDrop, WhatsApp...). Ideal em celular.</p>
          <button
            onClick={compartilhar}
            disabled={!webShareSuportado()}
            className="w-full px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700 font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
            {webShareSuportado() ? 'Compartilhar' : 'Indisponível aqui'}
          </button>
        </div>

        <div className="bg-white rounded-xl shadow-sm border border-red-200 p-5">
          <Icon name="trash" className="w-8 h-8 text-red-600 mb-2"/>
          <h3 className="font-bold text-slate-800 mb-1">Zerar tudo</h3>
          <p className="text-xs text-slate-500 mb-3">Apaga todos os dados deste navegador. Exporte antes.</p>
          <button onClick={resetar} className="w-full px-4 py-2 bg-white text-red-700 border border-red-300 rounded-lg text-sm hover:bg-red-50 font-semibold">
            Apagar dados
          </button>
        </div>
      </div>

      {/* Sync automático com pasta (File System Access API) */}
      <div className="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h3 className="font-bold text-slate-800 mb-1 flex items-center gap-2">
          ☁️ Sincronização automática com pasta
        </h3>
        <p className="text-xs text-slate-500 mb-3">
          Conecte uma pasta do seu dispositivo (ideal: uma pasta sincronizada com <strong>Google Drive Desktop, OneDrive, iCloud Drive ou Dropbox Desktop</strong>).
          O app gravará <code className="bg-slate-100 px-1 rounded">{FS_SYNC_FILENAME}</code> automaticamente nessa pasta a cada mudança, e o serviço de sync nativo cuidará de enviar para a nuvem.
          Disponível em <strong>Chrome/Edge no desktop e Android</strong>. Não funciona em Firefox/Safari/iOS.
        </p>

        {!fsAccessSuportado() ? (
          <div className="p-3 bg-amber-50 border border-amber-200 rounded text-sm text-amber-900">
            ⚠ Seu navegador não suporta esta funcionalidade. Use Chrome ou Edge (desktop ou Android).
            Em Firefox/Safari/iOS, use o botão <strong>Compartilhar</strong> acima para enviar manualmente.
          </div>
        ) : !statusPasta?.conectada ? (
          <div>
            <button
              onClick={conectarPasta}
              disabled={carregandoSync}
              className="px-4 py-2 bg-sky-600 text-white rounded-lg text-sm hover:bg-sky-700 font-semibold disabled:opacity-50">
              {carregandoSync ? 'Conectando...' : 'Conectar pasta'}
            </button>
            <p className="text-xs text-slate-400 mt-2">
              Você só precisa fazer isso uma vez. O navegador pedirá permissão para a pasta escolhida.
            </p>
          </div>
        ) : (
          <div>
            <div className={`p-3 rounded border mb-3 ${statusPasta.permissao === 'granted' ? 'bg-emerald-50 border-emerald-200' : 'bg-amber-50 border-amber-200'}`}>
              <div className="flex items-start justify-between gap-2 flex-wrap">
                <div>
                  <div className="font-semibold text-slate-800">
                    Pasta: <code className="bg-white px-1.5 py-0.5 rounded text-emerald-700">{statusPasta.nome}</code>
                  </div>
                  {statusPasta.permissao === 'granted' ? (
                    <div className="text-xs text-emerald-700 mt-1">✓ Permissão concedida — sincronização ativa</div>
                  ) : (
                    <div className="text-xs text-amber-700 mt-1">⚠ Permissão expirada. Reautorize para retomar o sync.</div>
                  )}
                  {syncStatus?.ok && syncStatus.ultimo && (
                    <div className="text-xs text-slate-600 mt-1">
                      Último sync automático: {new Date(syncStatus.ultimo).toLocaleString('pt-BR')}
                    </div>
                  )}
                  {syncStatus && !syncStatus.ok && (
                    <div className="text-xs text-red-700 mt-1">
                      Último sync falhou: {syncStatus.motivo}
                    </div>
                  )}
                </div>
                <div className="flex gap-2 flex-wrap">
                  {statusPasta.permissao !== 'granted' && (
                    <button onClick={reautorizarPasta} disabled={carregandoSync}
                      className="px-3 py-1.5 bg-amber-600 text-white rounded text-xs hover:bg-amber-700 disabled:opacity-50">
                      Reautorizar
                    </button>
                  )}
                  <button onClick={forcarSync} disabled={carregandoSync}
                    className="px-3 py-1.5 bg-sky-600 text-white rounded text-xs hover:bg-sky-700 disabled:opacity-50">
                    Sincronizar agora
                  </button>
                  <button onClick={desconectarPasta} disabled={carregandoSync}
                    className="px-3 py-1.5 bg-white text-slate-700 border border-slate-300 rounded text-xs hover:bg-slate-50 disabled:opacity-50">
                    Desconectar
                  </button>
                </div>
              </div>
            </div>
            <p className="text-xs text-slate-500">
              O backup é gravado automaticamente cerca de 5 segundos após qualquer alteração no app.
              Se você escolheu uma pasta sincronizada na nuvem, o arquivo é enviado pelo serviço de sync do dispositivo.
            </p>
          </div>
        )}
      </div>

      <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h3 className="font-bold text-slate-800 mb-3">Conteúdo atual</h3>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
          <div className="p-3 bg-slate-50 rounded"><div className="text-2xl font-bold text-slate-800">{stats.cronograma}</div><div className="text-xs text-slate-500">Dias marcados</div></div>
          <div className="p-3 bg-slate-50 rounded"><div className="text-2xl font-bold text-slate-800">{stats.questoes}</div><div className="text-xs text-slate-500">Questões respondidas</div></div>
          <div className="p-3 bg-slate-50 rounded"><div className="text-2xl font-bold text-slate-800">{stats.flashcards}</div><div className="text-xs text-slate-500">Flashcards</div></div>
          <div className="p-3 bg-slate-50 rounded"><div className="text-2xl font-bold text-slate-800">{stats.notas}</div><div className="text-xs text-slate-500">Blocos com notas</div></div>
          <div className="p-3 bg-slate-50 rounded"><div className="text-2xl font-bold text-slate-800">{stats.redacoes}</div><div className="text-xs text-slate-500">Redações</div></div>
          <div className="p-3 bg-slate-50 rounded"><div className="text-2xl font-bold text-slate-800">{stats.simulados}</div><div className="text-xs text-slate-500">Simulados</div></div>
          <div className="p-3 bg-slate-50 rounded"><div className="text-2xl font-bold text-slate-800">{stats.apostas}</div><div className="text-xs text-slate-500">Apostas/erros</div></div>
        </div>
      </div>

      {/* Status de armazenamento e persistência */}
      <div className="mt-6 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2">
          <Icon name="db" className="w-5 h-5 text-slate-600"/> Status de armazenamento
        </h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
          <div>
            <div className="text-xs uppercase tracking-wider text-slate-500 mb-1">Storage primário</div>
            <div className="text-slate-800 font-medium">IndexedDB + localStorage (espelho)</div>
            <p className="text-xs text-slate-500 mt-1">
              Dados são gravados em ambos. Se um deles for limpo, o outro restaura na próxima abertura.
            </p>
          </div>
          <div>
            <div className="text-xs uppercase tracking-wider text-slate-500 mb-1">Persistência permanente</div>
            {persistStatus === null ? (
              <div className="text-slate-500">Verificando…</div>
            ) : persistStatus.indisponivel ? (
              <div className="text-amber-700 font-medium">Não suportado neste navegador</div>
            ) : persistStatus.persisted ? (
              <div className="text-emerald-700 font-medium">✓ Concedida — dados protegidos contra limpeza automática</div>
            ) : (
              <div className="text-amber-700 font-medium">
                ✗ Não concedida — navegador pode apagar dados sob pressão de memória ou após dias sem uso (iOS/Safari: 7 dias).
                <br/><span className="text-xs text-slate-600">Aumenta a concessão: instalar como app, usar mais o site, ou marcar como favorito.</span>
              </div>
            )}
          </div>
          {estimativa && estimativa.quota > 0 && (
            <div className="md:col-span-2">
              <div className="text-xs uppercase tracking-wider text-slate-500 mb-1">Uso de espaço (estimativa do navegador)</div>
              <div className="text-slate-700">
                {(estimativa.usage / 1024 / 1024).toFixed(2)} MB usados de {(estimativa.quota / 1024 / 1024).toFixed(0)} MB disponíveis
                {' '}({((estimativa.usage / estimativa.quota) * 100).toFixed(3)}%)
              </div>
              <div className="w-full bg-slate-100 rounded-full h-1.5 mt-1">
                <div className="bg-emerald-500 h-1.5 rounded-full" style={{ width: `${Math.min(100, (estimativa.usage / estimativa.quota) * 100)}%` }}></div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Snapshots automáticos internos */}
      <div className="mt-6 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h3 className="font-bold text-slate-800 mb-1">📸 Snapshots automáticos (até 7 dias)</h3>
        <p className="text-xs text-slate-500 mb-3">
          O app guarda automaticamente até 7 fotos diárias do seu progresso no IndexedDB.
          Se algo der errado (corrupção, erro de importação), você pode voltar a um estado anterior.
          Estes snapshots ficam no dispositivo — <strong>não substituem o backup exportado</strong>, que deve sair do navegador.
        </p>
        {snapshots.length === 0 ? (
          <div className="text-xs text-slate-500 italic">Nenhum snapshot ainda. O primeiro será criado em breve.</div>
        ) : (
          <div className="space-y-2">
            {snapshots.map(snap => {
              const dt = new Date(snap.timestamp);
              const horas = Math.floor((Date.now() - snap.timestamp) / 3600000);
              const idade = horas < 24 ? `${horas}h atrás` : `${Math.floor(horas/24)}d atrás`;
              return (
                <div key={snap.id} className="flex items-center justify-between gap-2 p-2 bg-slate-50 rounded text-sm">
                  <div>
                    <div className="font-medium text-slate-800">{dt.toLocaleString('pt-BR')}</div>
                    <div className="text-xs text-slate-500">{idade}</div>
                  </div>
                  <button
                    disabled={carregandoSnap}
                    onClick={async () => {
                      if (!confirm(`Restaurar o estado salvo em ${dt.toLocaleString('pt-BR')}? O estado atual será substituído. Recomendação: exporte um backup antes.`)) return;
                      setCarregandoSnap(true);
                      try {
                        const restaurado = migrarEstado(snap.estado);
                        setState(restaurado);
                        setMensagem({ tipo: 'ok', texto: `✓ Estado restaurado do snapshot de ${dt.toLocaleString('pt-BR')}.` });
                      } catch (e) {
                        setMensagem({ tipo: 'erro', texto: '✗ Erro ao restaurar: ' + e.message });
                      } finally {
                        setCarregandoSnap(false);
                      }
                    }}
                    className="px-3 py-1.5 bg-slate-700 text-white text-xs rounded hover:bg-slate-800 disabled:opacity-50">
                    Restaurar
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-900">
        <strong>⚠ Por que exportar o backup mesmo com tudo isso?</strong>
        <ul className="list-disc pl-5 mt-2 space-y-1 text-xs">
          <li><strong>IndexedDB + localStorage + snapshots</strong> protegem contra perda parcial, mas tudo fica no mesmo dispositivo.</li>
          <li>Trocar de celular/computador, formatar, perder o aparelho ou limpar tudo manualmente <strong>apaga as três camadas</strong>.</li>
          <li>Sem persistência permanente concedida (comum em iOS/Safari), o sistema pode limpar dados em ~7 dias sem uso.</li>
          <li>Exporte o JSON pelo menos a cada 3 dias para Drive, e-mail ou pendrive — é a única cópia que sai do dispositivo.</li>
        </ul>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
