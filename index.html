nciária do Ceará (regime próprio).","lei_seca":"Lei Estadual 16.397/2017 - arts. finais (1ª instância e administração). Lei do regime próprio previdenciário CE. ~40 arts."},{"codigo":"B5","titulo":"Direitos das Pessoas com Deficiência (Res. CSJT 386/2024 art...","conteudo":"Direitos das Pessoas com Deficiência (Res. CSJT 386/2024 art. 6º): Lei 13.146/2015 (EPD), Lei 11.126/2005, Lei 10.098/2000, Decreto 5.296/2004, Lei 10.048/2000, Lei 8.899/1994, Lei 7.853/1989, Decreto 3.298/1999.","lei_seca":"Lei 13.146/2015 arts. 1º-13, 84-91 (EPD - princípios + Acessibilidade). Lei 10.098/2000 arts. 1º-12 (Acessibilidade). Lei 7.853/1989 (integral - curta). ~30 arts."}]},"GE1":{"disciplina":"Língua Portuguesa","prioridade":"ALTA","blocos":[{"codigo":"B1","titulo":"Compreensão e interpretação de textos. Denotação x conotação...","conteudo":"Compreensão e interpretação de textos. Denotação x conotação. Intertextualidade. Discurso (direto, indireto, indireto livre). Figuras de linguagem (metáfora, metonímia, ironia, hipérbole).","lei_seca":"Gramática normativa – Interpretação textual. Manual de Bechara/Cegalla – capítulos sobre semântica e figuras."},{"codigo":"B2","titulo":"Morfossintaxe. Classes de palavras (substantivo, adjetivo, v...","conteudo":"Morfossintaxe. Classes de palavras (substantivo, adjetivo, verbo, pronome, advérbio, conjunção, preposição). Pronomes (colocação pronominal). Formação de palavras. Flexão nominal e verbal.","lei_seca":"Gramática – Morfologia (classes e flexão). Tabela de pronomes oblíquos e regras de próclise/ênclise/mesóclise."},{"codigo":"B3","titulo":"Concordância nominal e verbal. Regência nominal e verbal. Cr...","conteudo":"Concordância nominal e verbal. Regência nominal e verbal. Crase. Coordenação e subordinação. Conectivos.","lei_seca":"Gramática – Sintaxe de concordância (atenção a casos especiais: sujeito posposto, expressões partitivas) e regência (lista de verbos). Regras de crase."},{"codigo":"B4","titulo":"Ortografia (atual). Acentuação gráfica (regras + exceções). ...","conteudo":"Ortografia (atual). Acentuação gráfica (regras + exceções). Pontuação (vírgula, ponto e vírgula, dois-pontos, travessão).","lei_seca":"Acordo Ortográfico (Decreto 6.583/2008). Regras de acentuação (oxítonas, paroxítonas, proparoxítonas, ditongos abertos, hiatos). Regras de pontuação."},{"codigo":"B5","titulo":"Reescrita: equivalência e transformação de estruturas. Redaç...","conteudo":"Reescrita: equivalência e transformação de estruturas. Redação dissertativo-argumentativa. Estrutura (intro+desenvolvimento+conclusão+proposta). Coesão e coerência.","lei_seca":"Manual de Redação Oficial. Exemplos de redações nota máxima FCC. Critérios FCC (tema 7 + norma 3)."}]},"GE2":{"disciplina":"Raciocínio Lógico-Matemático","prioridade":"MÉDIA","blocos":[{"codigo":"B1","titulo":"Estruturas lógicas. Lógica proposicional (∧,∨,→,↔,¬). Tabela...","conteudo":"Estruturas lógicas. Lógica proposicional (∧,∨,→,↔,¬). Tabelas-verdade. Tautologias e contradições. Equivalências (P→Q ≡ ¬Q→¬P). Negações (Leis de Morgan). Quantificadores. Diagramas lógicos.","lei_seca":"Tabela-verdade dos 5 operadores. Lei do Contrapositivo. Leis de Morgan. Negação de quantificadores."},{"codigo":"B2","titulo":"Raciocínio verbal e sequencial. Sequências numéricas (PA, PG...","conteudo":"Raciocínio verbal e sequencial. Sequências numéricas (PA, PG, Fibonacci). Sequências figurativas. Orientação espacial e temporal. Diagramas de Venn.","lei_seca":"Fórmulas: an = a1 + (n-1)·r (PA); an = a1·q^(n-1) (PG). Operações com conjuntos."},{"codigo":"B3","titulo":"Proporcionalidade direta e inversa. Razão e proporção. Regra...","conteudo":"Proporcionalidade direta e inversa. Razão e proporção. Regra de três simples e composta. Porcentagem. Acréscimos e descontos sucessivos. Juros simples e compostos.","lei_seca":"Fórmulas: J=C·i·t (simples); M=C·(1+i)^t (composto). Acréscimos: V·(1+i). Descontos sucessivos."},{"codigo":"B4","titulo":"Estatística descritiva: medidas de tendência central (média,...","conteudo":"Estatística descritiva: medidas de tendência central (média, mediana, moda). Medidas de dispersão (amplitude, variância, desvio padrão). Gráficos e tabelas (interpretação).","lei_seca":"Fórmulas: x̄ = Σx/n; σ² = Σ(x-x̄)²/n; σ = √σ². Diferença entre variância populacional e amostral."}]}},"questoes":[{"id":1,"disciplina":"Direito Constitucional","grupo":"G1","bloco":"B1","nivel":"médio","enunciado":"As normas constitucionais de eficácia contida caracterizam-se por","alternativas":{"A":"não produzirem efeitos enquanto não houver regulamentação legislativa.","B":"produzirem todos os efeitos desde a promulgação, podendo ter sua aplicabilidade restringida por lei posterior.","C":"produzirem apenas efeitos programáticos, voltados ao legislador.","D":"dependerem de norma regulamentadora para sua aplicação plena.","E":"vincularem apenas o Poder Judiciário."},"gabarito":"B","explicacao":"Normas de eficácia contida (José Afonso da Silva) são de aplicabilidade direta e imediata, mas podem ter seu alcance restringido por lei posterior. Ex.: art. 5º, XIII (livre exercício profissional, atendidas as qualificações que a lei estabelecer)."},{"id":2,"disciplina":"Direito Constitucional","grupo":"G1","bloco":"B2","nivel":"fácil","enunciado":"Sobre o mandado de segurança, é correto afirmar:","alternativas":{"A":"Pode ser impetrado para proteger direito amparado por habeas corpus ou habeas data.","B":"O prazo decadencial para sua impetração é de 180 dias.","C":"Cabe contra ato de autoridade pública ou agente de pessoa jurídica de direito privado no exercício de atribuições do Poder Público.","D":"Não cabe MS coletivo.","E":"Não admite a concessão de liminar."},"gabarito":"C","explicacao":"Lei 12.016/2009, art. 1º: cabe contra autoridade pública ou agente equiparado. Prazo é de 120 dias (não 180). Há MS coletivo (art. 21). Admite liminar (art. 7º, III). Não cabe contra direito amparado por HC ou HD (art. 5º, II)."},{"id":3,"disciplina":"Direito Constitucional","grupo":"G1","bloco":"B4","nivel":"difícil","enunciado":"Sobre o controle concentrado de constitucionalidade,","alternativas":{"A":"a decisão em ADI possui efeitos inter partes e ex nunc, salvo modulação.","B":"ADC pode ser proposta apenas pelo Procurador-Geral da República.","C":"ADPF tem caráter subsidiário, somente cabível quando não houver outro meio eficaz.","D":"o STJ é competente para julgar ADI estadual.","E":"a súmula vinculante depende de aprovação por maioria simples no STF."},"gabarito":"C","explicacao":"Lei 9.882/1999, art. 4º, §1º: a ADPF tem caráter subsidiário (princípio da subsidiariedade). ADI tem efeito erga omnes e ex tunc (regra). ADC tem o mesmo rol de legitimados da ADI (art. 103 CF). Súmula vinculante exige 2/3 dos votos do STF (art. 103-A)."},{"id":4,"disciplina":"Direito Constitucional","grupo":"G1","bloco":"B6","nivel":"médio","enunciado":"O Conselho Nacional de Justiça (CNJ) tem por atribuição","alternativas":{"A":"julgar recursos contra decisões de Tribunais de Justiça.","B":"exercer controle da atuação administrativa e financeira do Poder Judiciário e do cumprimento dos deveres funcionais dos juízes.","C":"editar súmulas vinculantes.","D":"nomear ministros do STF.","E":"julgar conflitos de competência entre tribunais superiores."},"gabarito":"B","explicacao":"CF/88, art. 103-B, §4º. O CNJ não exerce jurisdição (não julga recursos), apenas controle administrativo e correcional do Judiciário."},{"id":5,"disciplina":"Direito Constitucional","grupo":"G1","bloco":"B6","nivel":"médio","enunciado":"Sobre o regime de precatórios na Constituição:","alternativas":{"A":"todos os créditos contra a Fazenda Pública seguem o regime de precatório, sem exceções.","B":"as requisições de pequeno valor (RPV) seguem o regime do precatório.","C":"os créditos de natureza alimentícia têm preferência sobre os demais.","D":"o pagamento de precatórios pode ser feito em até 20 anos.","E":"o credor não pode ceder seu crédito de precatório a terceiros."},"gabarito":"C","explicacao":"CF/88, art. 100, §1º: os créditos de natureza alimentícia (salários, vencimentos, aposentadorias, pensões, indenização por morte ou invalidez) têm preferência. RPVs não seguem o regime do precatório (são pagas em até 60 dias). Cessão é permitida (§13)."},{"id":6,"disciplina":"Direito Administrativo","grupo":"G2","bloco":"B1","nivel":"fácil","enunciado":"Os princípios expressos da Administração Pública previstos no art. 37 da CF são:","alternativas":{"A":"legalidade, impessoalidade, moralidade, publicidade e eficiência (LIMPE).","B":"legalidade, impessoalidade, moralidade, publicidade e razoabilidade.","C":"legalidade, impessoalidade, moralidade, publicidade e proporcionalidade.","D":"legalidade, isonomia, moralidade, publicidade e eficiência.","E":"legalidade, impessoalidade, motivação, publicidade e eficiência."},"gabarito":"A","explicacao":"CF/88, art. 37, caput. O acrônimo LIMPE memoriza os princípios expressos. A eficiência foi incluída pela EC 19/1998."},{"id":7,"disciplina":"Direito Administrativo","grupo":"G2","bloco":"B2","nivel":"médio","enunciado":"Sobre o ato administrativo, é correto afirmar:","alternativas":{"A":"todo ato administrativo é discricionário.","B":"a presunção de legitimidade é absoluta e não admite prova em contrário.","C":"a autoexecutoriedade está presente em todos os atos administrativos.","D":"a anulação produz efeitos ex tunc; a revogação, ex nunc.","E":"a convalidação só é admitida em atos vinculados."},"gabarito":"D","explicacao":"A anulação decorre de vício de legalidade (ex tunc - retroage). A revogação decorre de juízo de conveniência e oportunidade (ex nunc - efeito futuro). Súmulas 346 e 473 do STF."},{"id":8,"disciplina":"Direito Administrativo","grupo":"G2","bloco":"B3","nivel":"médio","enunciado":"No regime da Lei 8.112/1990, a estabilidade do servidor público é adquirida após","alternativas":{"A":"2 anos de efetivo exercício, mediante aprovação em estágio probatório.","B":"3 anos de efetivo exercício, mediante aprovação em avaliação especial de desempenho.","C":"5 anos de efetivo exercício.","D":"a posse no cargo público de provimento efetivo.","E":"o decurso de prazo superior a 8 anos no cargo."},"gabarito":"B","explicacao":"CF/88, art. 41 (redação EC 19/1998): estabilidade após 3 anos de efetivo exercício, com avaliação especial de desempenho. O estágio probatório também é de 3 anos."},{"id":9,"disciplina":"Direito Administrativo","grupo":"G2","bloco":"B5","nivel":"difícil","enunciado":"Sob a Lei 14.133/2021, em regra, o critério de julgamento adequado para serviços comuns de engenharia é","alternativas":{"A":"melhor técnica.","B":"maior lance ou oferta.","C":"menor preço ou maior desconto.","D":"técnica e preço, obrigatoriamente.","E":"melhor remuneração."},"gabarito":"C","explicacao":"Lei 14.133/2021, art. 33, I: o critério padrão é menor preço/maior desconto. Técnica e preço só são obrigatórios em certos casos específicos do art. 36."},{"id":10,"disciplina":"Direito Administrativo","grupo":"G2","bloco":"B7","nivel":"médio","enunciado":"Quanto à Lei de Improbidade Administrativa (Lei 8.429/1992, com redação dada pela Lei 14.230/2021):","alternativas":{"A":"o ato culposo continua sendo punível.","B":"a modalidade culposa foi suprimida, sendo punível apenas o dolo específico.","C":"é vedada a celebração de acordo de não persecução cível.","D":"a prescrição é de 10 anos, contados da consumação.","E":"o particular pode ser punido sem participação de agente público."},"gabarito":"B","explicacao":"Lei 14.230/2021 alterou a Lei 8.429: exige-se DOLO ESPECÍFICO (vontade de obter o resultado ilícito). A modalidade culposa foi suprimida. O acordo de não persecução cível é permitido (art. 17-B). Particular só responde se houver agente público envolvido."},{"id":11,"disciplina":"Direito Civil","grupo":"G3","bloco":"B1","nivel":"médio","enunciado":"Sobre a desconsideração da personalidade jurídica no CC:","alternativas":{"A":"é automática quando há inadimplência.","B":"depende de pedido do credor e decisão judicial, em caso de abuso da personalidade.","C":"o sócio respondente é determinado pelo juiz sem necessidade de contraditório.","D":"pode ocorrer apenas em relações trabalhistas.","E":"vincula automaticamente todos os sócios sem distinção."},"gabarito":"B","explicacao":"CC art. 50: necessidade de abuso da personalidade jurídica (desvio de finalidade ou confusão patrimonial), mediante pedido e decisão judicial. CPC art. 133 e seguintes asseguram o incidente próprio com contraditório."},{"id":12,"disciplina":"Direito Civil","grupo":"G3","bloco":"B3","nivel":"médio","enunciado":"Nas obrigações de pagar quantia certa, a mora do devedor se constitui:","alternativas":{"A":"apenas mediante notificação extrajudicial.","B":"automaticamente, pelo simples decurso do prazo (mora ex re), quando há termo certo.","C":"a partir da citação válida, em qualquer caso.","D":"somente quando há ajuizamento de ação.","E":"depende de prévia tentativa de acordo."},"gabarito":"B","explicacao":"CC art. 397: 'O inadimplemento da obrigação, positiva e líquida, no seu termo, constitui de pleno direito em mora o devedor.' Trata-se da mora ex re (dies interpellat pro homine)."},{"id":13,"disciplina":"Direito Civil","grupo":"G3","bloco":"B5","nivel":"difícil","enunciado":"Quanto à responsabilidade civil, o CC adota:","alternativas":{"A":"exclusivamente a teoria subjetiva (culpa).","B":"exclusivamente a teoria objetiva (risco).","C":"a teoria subjetiva como regra, sendo a objetiva exceção prevista em lei ou em razão do risco da atividade.","D":"a responsabilidade integral do Estado em qualquer caso.","E":"sempre a culpa presumida do empregador."},"gabarito":"C","explicacao":"CC arts. 186 e 927: regra geral é culpa (subjetiva). O parágrafo único do art. 927 prevê responsabilidade objetiva nos casos especificados em lei ou quando a atividade normalmente desenvolvida implicar risco aos direitos de outrem."},{"id":14,"disciplina":"Direito Civil","grupo":"G3","bloco":"B6","nivel":"médio","enunciado":"A usucapião extraordinária de bem imóvel exige:","alternativas":{"A":"5 anos de posse mansa e pacífica, independentemente de boa-fé.","B":"10 anos de posse, com justo título e boa-fé.","C":"15 anos de posse, mansa, pacífica e ininterrupta, independentemente de justo título e boa-fé.","D":"20 anos de posse com justo título.","E":"30 anos de posse ininterrupta."},"gabarito":"C","explicacao":"CC art. 1.238: usucapião extraordinária - 15 anos, sem necessidade de justo título e boa-fé. O prazo reduz-se a 10 anos se o possuidor estabelecer sua moradia habitual no imóvel ou nele realizar obras produtivas."},{"id":15,"disciplina":"Direito Civil","grupo":"G3","bloco":"B7","nivel":"médio","enunciado":"Sobre o regime da comunhão parcial de bens:","alternativas":{"A":"comunicam-se todos os bens, inclusive os adquiridos antes do casamento.","B":"comunicam-se apenas os bens adquiridos onerosamente na constância do casamento.","C":"não há comunicação patrimonial.","D":"os bens são divididos meio a meio independentemente da origem.","E":"é regime obrigatório para todos os casamentos."},"gabarito":"B","explicacao":"CC art. 1.658: na comunhão parcial comunicam-se os bens adquiridos onerosamente na constância do casamento. Excluem-se os bens que cada cônjuge possuir antes (art. 1.659, I)."},{"id":16,"disciplina":"Direito Processual Civil","grupo":"G4","bloco":"B1","nivel":"médio","enunciado":"Sobre a competência no CPC:","alternativas":{"A":"a incompetência absoluta pode ser declarada de ofício pelo juiz a qualquer tempo.","B":"a incompetência relativa deve ser declarada de ofício pelo juiz.","C":"as cláusulas de eleição de foro vinculam ambas as partes em qualquer hipótese.","D":"a competência funcional é relativa.","E":"a conexão e a continência não modificam a competência."},"gabarito":"A","explicacao":"CPC art. 64, §1º: a incompetência absoluta pode ser alegada em qualquer tempo e grau de jurisdição e deve ser declarada de ofício. A relativa não pode ser declarada de ofício (Súmula 33 STJ)."},{"id":17,"disciplina":"Direito Processual Civil","grupo":"G4","bloco":"B2","nivel":"médio","enunciado":"O litisconsórcio é necessário quando:","alternativas":{"A":"todos os interessados querem participar do processo.","B":"a decisão deve ser uniforme para todos, por disposição legal ou pela natureza da relação jurídica.","C":"há vários autores propondo uma única ação.","D":"o juiz determina a inclusão de mais partes.","E":"as partes têm o mesmo advogado."},"gabarito":"B","explicacao":"CPC art. 114: o litisconsórcio é necessário quando, por disposição de lei ou pela natureza da relação jurídica, a eficácia da sentença depender da citação de todos os litisconsortes."},{"id":18,"disciplina":"Direito Processual Civil","grupo":"G4","bloco":"B5","nivel":"médio","enunciado":"Sobre o ônus da prova no CPC:","alternativas":{"A":"o autor sempre prova todos os fatos.","B":"o réu apenas se defende, nunca prova.","C":"ao autor incumbe provar o fato constitutivo de seu direito; ao réu, o fato impeditivo, modificativo ou extintivo.","D":"o juiz não pode redistribuir o ônus da prova.","E":"o ônus da prova é sempre fixo, jamais dinâmico."},"gabarito":"C","explicacao":"CPC art. 373: regra estática do ônus. O §1º admite a distribuição dinâmica nos casos de impossibilidade ou excessiva dificuldade. O juiz pode redistribuir motivadamente."},{"id":19,"disciplina":"Direito Processual Civil","grupo":"G4","bloco":"B6","nivel":"difícil","enunciado":"No cumprimento de sentença que reconhece exigibilidade de obrigação de pagar quantia certa pela Fazenda Pública:","alternativas":{"A":"o pagamento é feito por meio de penhora em conta corrente.","B":"o procedimento segue rito de execução comum.","C":"o pagamento é feito por meio de precatório ou RPV, conforme o valor.","D":"a Fazenda paga em até 30 dias após citação.","E":"não há prazo para a Fazenda impugnar."},"gabarito":"C","explicacao":"CPC art. 535 e CF art. 100: os pagamentos pela Fazenda Pública são feitos por precatório (valor maior) ou RPV (valor menor). Bens públicos são impenhoráveis (CPC art. 833)."},{"id":20,"disciplina":"Direito Processual Civil","grupo":"G4","bloco":"B7","nivel":"médio","enunciado":"Cabe agravo de instrumento, na forma do CPC:","alternativas":{"A":"de toda decisão interlocutória.","B":"das decisões interlocutórias previstas em rol taxativo (art. 1.015), com possibilidade de impugnação por apelação para as não listadas.","C":"apenas de sentenças.","D":"de qualquer ato do processo.","E":"da sentença que extingue o processo sem resolução de mérito."},"gabarito":"B","explicacao":"CPC art. 1.015: rol das decisões interlocutórias agraváveis. O STJ flexibilizou para 'taxatividade mitigada' (Tema 988). As demais interlocutórias se impugnam em preliminar de apelação ou contrarrazões (art. 1.009, §1º)."},{"id":21,"disciplina":"Direito Penal","grupo":"G5","bloco":"B1","nivel":"médio","enunciado":"Sobre a aplicação da lei penal no tempo:","alternativas":{"A":"a lei penal sempre retroage.","B":"a lei penal só retroage para prejudicar o réu.","C":"a lei penal retroage para beneficiar o réu, mesmo após o trânsito em julgado.","D":"a lei penal nunca retroage.","E":"a lei penal benéfica precisa ser invocada pela parte."},"gabarito":"C","explicacao":"CF art. 5º, XL e CP art. 2º, parágrafo único: a lei penal mais benéfica retroage ainda que o fato já tenha sido decidido por sentença condenatória transitada em julgado (novatio legis in mellius)."},{"id":22,"disciplina":"Direito Penal","grupo":"G5","bloco":"B2","nivel":"médio","enunciado":"Quanto às penas no CP:","alternativas":{"A":"as penas privativas de liberdade podem ser cumuladas com restritivas de direitos.","B":"as penas restritivas de direitos são autônomas e substituem a privativa de liberdade, atendidos os requisitos.","C":"a pena de multa é sempre cumulada com a pena privativa de liberdade.","D":"a pena máxima admissível é de 50 anos.","E":"a reincidência impede a substituição."},"gabarito":"B","explicacao":"CP art. 44: as restritivas de direitos são autônomas e substitutivas. Requisitos: pena não superior a 4 anos, crime não cometido com violência ou grave ameaça, não reincidência em crime doloso e circunstâncias favoráveis. Tempo máximo de cumprimento: 40 anos (art. 75 com EC)."},{"id":23,"disciplina":"Direito Penal","grupo":"G5","bloco":"B3","nivel":"médio","enunciado":"O crime de furto qualificado pelo concurso de pessoas (art. 155, §4º, IV) exige:","alternativas":{"A":"a presença física de todos os agentes no local do furto.","B":"o concurso de duas ou mais pessoas, podendo um deles ser inimputável.","C":"apenas a presença de duas pessoas adultas.","D":"a participação de organização criminosa.","E":"o emprego de violência."},"gabarito":"B","explicacao":"Súmula 442 STJ e jurisprudência majoritária: o concurso de pessoas no furto exige duas ou mais pessoas, podendo uma delas ser inimputável (criança ou adolescente). Não exige presença física simultânea (autoria mediata)."},{"id":24,"disciplina":"Direito Penal","grupo":"G5","bloco":"B4","nivel":"difícil","enunciado":"Sobre o crime de peculato (art. 312 CP):","alternativas":{"A":"só funcionário público pode ser sujeito ativo, em qualquer modalidade.","B":"a posse anterior do bem é elemento essencial do tipo.","C":"é crime impossível se o bem é restituído antes da sentença.","D":"admite forma culposa (peculato culposo), com extinção da punibilidade se o dano for reparado antes da sentença irrecorrível.","E":"a tentativa não é admitida."},"gabarito":"D","explicacao":"CP art. 312, §2º (culposo) e §3º: a reparação do dano antes da sentença irrecorrível extingue a punibilidade no peculato culposo; se posterior, reduz a pena pela metade. Particular pode responder como coautor/partícipe quando ciente da condição funcional."},{"id":25,"disciplina":"Direito Penal","grupo":"G5","bloco":"B5","nivel":"difícil","enunciado":"A Lei 9.613/1998 (Lavagem de Dinheiro), em sua redação atual:","alternativas":{"A":"exige antecedente exclusivamente de tráfico de drogas.","B":"admite qualquer infração penal como antecedente.","C":"limita o antecedente a crimes contra a Administração Pública.","D":"exige condenação prévia pelo crime antecedente.","E":"foi declarada inconstitucional pelo STF."},"gabarito":"B","explicacao":"A redação dada pela Lei 12.683/2012 ampliou o rol: hoje qualquer infração penal (não mais um rol taxativo de crimes antecedentes) pode dar suporte à lavagem. Não exige condenação prévia, basta a comprovação da prática da infração antecedente."},{"id":26,"disciplina":"Direito Processual Penal","grupo":"G6","bloco":"B1","nivel":"médio","enunciado":"O inquérito policial é, no Direito Processual Penal brasileiro:","alternativas":{"A":"procedimento judicial obrigatório para a propositura da ação penal.","B":"procedimento administrativo, inquisitivo, sigiloso e dispensável.","C":"procedimento contraditório, com ampla defesa garantida.","D":"fase processual conduzida pelo juiz.","E":"sempre obrigatório, sob pena de nulidade da denúncia."},"gabarito":"B","explicacao":"CPP art. 4º e seguintes: o IP é administrativo, presidido pela autoridade policial. Inquisitivo (não há contraditório). Sigiloso (art. 20). Dispensável se já houver elementos para a denúncia (art. 39, §5º). Excepcionalmente o advogado tem acesso aos elementos já documentados (Súmula Vinculante 14 STF)."},{"id":27,"disciplina":"Direito Processual Penal","grupo":"G6","bloco":"B3","nivel":"médio","enunciado":"A prisão temporária é admitida quando:","alternativas":{"A":"em qualquer crime, a pedido do delegado.","B":"em qualquer crime, no curso da ação penal.","C":"nos crimes do rol da Lei 7.960/1989, durante o inquérito policial, com decisão judicial fundamentada.","D":"é decretada pelo próprio delegado de polícia.","E":"tem prazo máximo de 90 dias para qualquer crime."},"gabarito":"C","explicacao":"Lei 7.960/1989: cabimento durante o IP, nos crimes elencados (homicídio doloso qualificado, sequestro, roubo, extorsão, estupro, tráfico, etc.). Prazo: 5 dias + 5 (regra); 30 + 30 em crimes hediondos. Sempre por decisão judicial fundamentada."},{"id":28,"disciplina":"Direito Processual Penal","grupo":"G6","bloco":"B4","nivel":"fácil","enunciado":"No processo penal, a citação por edital:","alternativas":{"A":"é o meio prioritário de citação.","B":"só é admitida após esgotados os meios para localizar o acusado pessoalmente.","C":"dispensa a publicação em jornal.","D":"ocorre apenas em crimes contra a Administração Pública.","E":"não admite suspensão do processo se o réu não comparecer."},"gabarito":"B","explicacao":"CPP art. 363 e 366: a citação por edital é subsidiária. Esgotados os meios de citação pessoal, faz-se por edital. Se o acusado não comparecer nem constituir advogado, o processo e o prazo prescricional ficam suspensos (art. 366)."},{"id":29,"disciplina":"Direito Processual Penal","grupo":"G6","bloco":"B5","nivel":"difícil","enunciado":"No procedimento do Tribunal do Júri, da decisão de pronúncia cabe:","alternativas":{"A":"apelação.","B":"recurso em sentido estrito (RESE).","C":"agravo em execução.","D":"correição parcial.","E":"embargos infringentes."},"gabarito":"B","explicacao":"CPP art. 581, IV: cabe RESE da decisão de pronúncia. Da impronúncia ou da absolvição sumária cabe apelação (art. 416)."},{"id":30,"disciplina":"Direito Processual Penal","grupo":"G6","bloco":"B6","nivel":"médio","enunciado":"Sobre o habeas corpus no processo penal brasileiro:","alternativas":{"A":"só pode ser impetrado pelo próprio paciente.","B":"pode ser impetrado por qualquer pessoa, em favor próprio ou de outrem, e até pelo MP.","C":"depende de capacidade postulatória (advogado).","D":"é cabível apenas após o trânsito em julgado.","E":"é incompatível com a Constituição Federal."},"gabarito":"B","explicacao":"CPP art. 654: o HC pode ser impetrado por qualquer pessoa, em seu favor ou de outrem, e até mesmo pelo MP. Não exige capacidade postulatória (não precisa de advogado). É garantia fundamental (CF art. 5º, LXVIII)."},{"id":31,"disciplina":"Língua Portuguesa","grupo":"GE1","bloco":"B3","nivel":"médio","enunciado":"Assinale a alternativa em que o uso da crase está CORRETO:","alternativas":{"A":"Refiro-me à pessoas honestas.","B":"Cheguei à casa cansado.","C":"Entreguei o livro à diretora.","D":"Vou à pé até o trabalho.","E":"Saiu à correr."},"gabarito":"C","explicacao":"Crase = fusão de 'a' (preposição) + 'a' (artigo). Em 'entreguei à diretora', o verbo 'entregar' exige preposição 'a', e 'diretora' aceita o artigo 'a'. Não há crase antes de plural sem artigo (A), antes de palavras masculinas (D, E) nem antes de verbos. 'Casa' como morada própria não admite artigo."},{"id":32,"disciplina":"Língua Portuguesa","grupo":"GE1","bloco":"B3","nivel":"médio","enunciado":"Em qual alternativa a concordância verbal está correta?","alternativas":{"A":"Fazem dez anos que ele partiu.","B":"Houveram muitos problemas na reunião.","C":"Faz dois meses que não o vejo.","D":"Existe vários candidatos aptos.","E":"Vão haver muitas reclamações."},"gabarito":"C","explicacao":"Os verbos 'fazer' (no sentido temporal) e 'haver' (no sentido de existir) são impessoais e ficam sempre no singular. 'Existir', porém, é pessoal e concorda com o sujeito (em D, deveria ser 'existem'). 'Vão haver' = errado (haver impessoal não vai para plural nem com auxiliar)."},{"id":33,"disciplina":"Língua Portuguesa","grupo":"GE1","bloco":"B1","nivel":"fácil","enunciado":"O elemento coesivo 'todavia' estabelece relação de:","alternativas":{"A":"adição.","B":"conclusão.","C":"oposição/adversidade.","D":"causa.","E":"finalidade."},"gabarito":"C","explicacao":"'Todavia' é conjunção adversativa, sinônima de 'mas', 'porém', 'contudo', 'no entanto'. Indica oposição entre ideias."},{"id":34,"disciplina":"Língua Portuguesa","grupo":"GE1","bloco":"B2","nivel":"fácil","enunciado":"Na frase 'O magistrado proferiu sentença justa', a palavra 'justa' é:","alternativas":{"A":"substantivo.","B":"adjetivo.","C":"advérbio.","D":"pronome.","E":"verbo."},"gabarito":"B","explicacao":"'Justa' qualifica o substantivo 'sentença', exercendo a função de adjunto adnominal e pertencendo à classe gramatical dos adjetivos."},{"id":35,"disciplina":"Língua Portuguesa","grupo":"GE1","bloco":"B4","nivel":"fácil","enunciado":"Indique a alternativa em que a pontuação está adequada:","alternativas":{"A":"O servidor, faltou ao trabalho.","B":"Embora atrasado, ele compareceu à audiência.","C":"João disse: que viria amanhã.","D":"Foi-se, embora ainda estivesse cedo, todos saíram.","E":"Os funcionários os aprovados, receberam medalha."},"gabarito":"B","explicacao":"A oração subordinada adverbial concessiva ('Embora atrasado') deve ser separada por vírgula da principal. Em A não se separa sujeito do verbo. Em C não se usa dois-pontos antes de 'que'. Em D há frase confusa. Em E não se separa sujeito de seu adjunto restritivo."},{"id":36,"disciplina":"Raciocínio Lógico-Matemático","grupo":"GE2","bloco":"B1","nivel":"médio","enunciado":"A negação de 'Todos os servidores são pontuais' é:","alternativas":{"A":"Nenhum servidor é pontual.","B":"Existem servidores que não são pontuais.","C":"Todos os servidores não são pontuais.","D":"Nem todos os servidores são impontuais.","E":"Os servidores são impontuais."},"gabarito":"B","explicacao":"A negação de uma proposição universal afirmativa ('Todo A é B') é uma particular negativa ('Existe A que não é B'). Atenção: não confundir com a contrária ('Nenhum A é B')."},{"id":37,"disciplina":"Raciocínio Lógico-Matemático","grupo":"GE2","bloco":"B1","nivel":"médio","enunciado":"A proposição 'Se chove, então a rua fica molhada' equivale logicamente a:","alternativas":{"A":"Chove e a rua fica molhada.","B":"A rua fica molhada se, e somente se, chove.","C":"Se a rua não fica molhada, então não chove.","D":"Não chove ou a rua não fica molhada.","E":"Se a rua fica molhada, então chove."},"gabarito":"C","explicacao":"Equivalência fundamental: P→Q ≡ ¬Q→¬P (contrapositiva). Lei do contrapositivo. Atenção: P→Q NÃO equivale a Q→P (recíproca)."},{"id":38,"disciplina":"Raciocínio Lógico-Matemático","grupo":"GE2","bloco":"B3","nivel":"fácil","enunciado":"Um produto custa R$ 200,00. Após desconto de 15%, seu preço final será:","alternativas":{"A":"R$ 150,00","B":"R$ 170,00","C":"R$ 180,00","D":"R$ 185,00","E":"R$ 215,00"},"gabarito":"B","explicacao":"Desconto de 15% sobre R$ 200,00 = R$ 30,00. Preço final = 200 - 30 = R$ 170,00. Alternativa: 200 × (1 - 0,15) = 200 × 0,85 = 170."},{"id":39,"disciplina":"Raciocínio Lógico-Matemático","grupo":"GE2","bloco":"B4","nivel":"médio","enunciado":"A média aritmética das notas 7, 8, 6, 9 e 10 é:","alternativas":{"A":"7,5","B":"8,0","C":"8,2","D":"8,5","E":"9,0"},"gabarito":"B","explicacao":"Média = (7+8+6+9+10) / 5 = 40 / 5 = 8,0."},{"id":40,"disciplina":"Raciocínio Lógico-Matemático","grupo":"GE2","bloco":"B3","nivel":"difícil","enunciado":"Se 4 servidores cumprem uma tarefa em 10 dias, em quantos dias 5 servidores cumprirão a mesma tarefa, no mesmo ritmo?","alternativas":{"A":"5 dias","B":"6 dias","C":"7 dias","D":"8 dias","E":"12 dias"},"gabarito":"D","explicacao":"Regra de três inversa: mais servidores, menos dias. 4·10 = 5·x → x = 40/5 = 8 dias."}],"temas_redacao":[{"id":1,"titulo":"O papel do Poder Judiciário na concretização dos direitos sociais no Brasil contemporâneo","eixo":"Direito Constitucional / Sociedade","abordagem":"Discuta o ativismo judicial, o controle de políticas públicas e os limites entre judicialização e separação de poderes.","espelho":{"contextualizacao":"A Constituição Federal de 1988 elevou os direitos sociais (art. 6º) ao status de direitos fundamentais, prometendo saúde, educação, moradia e segurança a todos. A inércia recorrente dos Poderes Executivo e Legislativo na concretização dessas garantias, contudo, tem levado o Judiciário a um protagonismo crescente.","tese":"O Judiciário tem cumprido papel relevante na concretização dos direitos sociais, mas seu protagonismo deve observar os limites da separação dos poderes e da reserva do possível, sob pena de subverter a função jurisdicional.","argumentos":[{"ideia":"O ativismo judicial supre lacunas, mas pode comprometer a separação dos poderes","repertorio":"STF ADPF 45 (Min. Celso de Mello): excepcionalidade do controle de políticas públicas. Conceito de 'mínimo existencial' (Ana Paula de Barcellos). Lei 13.655/2018 alterou a LINDB inserindo arts. 20-30, exigindo análise das consequências práticas da decisão (consequencialismo)."},{"ideia":"A judicialização da saúde ilustra os dilemas: garantia individual versus impacto coletivo no orçamento","repertorio":"STF RE 855.178 (Tema 793) - solidariedade dos entes na saúde. Tema 6 do STF - medicamentos não incorporados pelo SUS. CNJ Justiça em Números 2024 mostra crescimento de demandas em saúde acima da média geral."}],"proposta":"Cabe ao CNJ, em parceria com escolas judiciais e o Ministério Público, ampliar a formação dos magistrados em consequencialismo jurídico e em técnicas de mediação de políticas públicas, com vistas a decisões estruturantes que dialoguem com Executivo e Legislativo, sem usurpar competências.","conectivos":["Nesse cenário","Por outro lado","Cumpre destacar","Em síntese","Diante do exposto"],"cuidados":["Não confundir judicialização com ativismo judicial","Evitar maniqueísmo (Judiciário bom x Executivo ruim)","Citar pelo menos uma decisão concreta do STF/STJ","Não esquecer da proposta de intervenção"]}},{"id":2,"titulo":"A Inteligência Artificial no serviço público: oportunidades e desafios éticos","eixo":"Tecnologia / Administração Pública","abordagem":"Tratamento de dados, automação de decisões administrativas, LGPD, viés algorítmico e accountability.","espelho":{"contextualizacao":"A adoção de ferramentas de Inteligência Artificial pela Administração Pública brasileira – do CNJ ao SUS – avança em ritmo acelerado, prometendo agilidade e eficiência, mas trazendo desafios éticos inéditos.","tese":"A incorporação responsável da IA no serviço público depende de marcos regulatórios claros, transparência algorítmica e supervisão humana qualificada, sob pena de comprometer direitos fundamentais.","argumentos":[{"ideia":"A IA traz ganhos concretos de eficiência, mas reproduz vieses dos dados usados em seu treinamento","repertorio":"Projeto Victor (STF), Athos (STJ) e Sócrates (CNJ) - exemplos de IA aplicada ao Judiciário. Estudo do Stanford CHAI mostra viés racial em algoritmos de reincidência. CF art. 5º, caput - princípio da igualdade."},{"ideia":"A LGPD impõe limites e obriga transparência no tratamento automatizado de dados","repertorio":"Lei 13.709/2018 art. 20 - direito à revisão de decisões automatizadas. PL 2.338/2023 (Marco da IA, em tramitação). ANPD - autoridade reguladora."}],"proposta":"Compete ao governo federal, em conjunto com a ANPD e o CNJ, editar diretrizes éticas vinculantes para uso de IA em órgãos públicos, exigir auditoria algorítmica anual e garantir o direito à revisão humana em decisões que afetem o cidadão.","conectivos":["Nesse contexto","Sob essa ótica","Cumpre ressaltar","Por conseguinte","À guisa de conclusão"],"cuidados":["Não tratar IA como inimiga ou panaceia","Citar a LGPD explicitamente","Não esquecer o viés algorítmico","Proposta com agente específico"]}},{"id":3,"titulo":"Desafios da modernização da gestão pública no Brasil","eixo":"Administração Pública","abordagem":"Governo digital, simplificação de processos, transparência, controle social e Lei 14.133/2021.","espelho":{"contextualizacao":"A modernização da gestão pública é diretriz constitucional desde a EC 19/1998, que introduziu o princípio da eficiência no art. 37 da CF. Apesar disso, o Brasil ainda enfrenta gargalos como morosidade administrativa, baixa interoperabilidade e desconfiança cidadã.","tese":"A modernização da Administração exige a integração entre digitalização, simplificação procedimental e fortalecimento do controle social, sustentada por marcos legais como a Lei 14.133/2021 e a LGPD.","argumentos":[{"ideia":"Governo digital reduz custos e amplia o acesso, mas exige inclusão digital","repertorio":"Plataforma GovBR concentrou mais de 150 milhões de usuários. Lei 14.063/2020 disciplinou a assinatura eletrônica. Pesquisa TIC Domicílios 2024 (CGI.br) revela que 24% dos brasileiros ainda não usam internet."},{"ideia":"A NLLC trouxe ganhos de eficiência mas demanda capacitação técnica","repertorio":"Lei 14.133/2021 - princípios da segregação de funções, do julgamento objetivo, do interesse público. PNCP (Portal Nacional de Contratações Públicas) consolidou dados nacionais. TCU acórdãos sobre boas práticas em pregão."}],"proposta":"Cabe à ENAP, em articulação com escolas estaduais de governo e tribunais de contas, oferecer trilhas obrigatórias de capacitação em gestão pública digital para servidores recém-empossados, condicionando progressão funcional a certificações periódicas.","conectivos":["Nesse panorama","Outrossim","Em que pese","Por essa razão","Em síntese"],"cuidados":["Citar a Lei 14.133/2021","Não esquecer da exclusão digital","Mencionar instrumentos concretos (GovBR, PNCP)","Proposta executável"]}},{"id":4,"titulo":"Acessibilidade e inclusão das pessoas com deficiência no Brasil","eixo":"Direitos Humanos","abordagem":"EPD (Lei 13.146/2015), barreiras urbanísticas e atitudinais, cotas em concursos, avaliação biopsicossocial.","espelho":{"contextualizacao":"O Censo IBGE 2022 identificou 18,6 milhões de brasileiros com algum tipo de deficiência. Embora a Convenção da ONU (Decreto 6.949/2009) e o Estatuto da Pessoa com Deficiência (Lei 13.146/2015) constituam marcos avançados, persistem barreiras urbanísticas e atitudinais que limitam o exercício pleno da cidadania.","tese":"A efetivação dos direitos das pessoas com deficiência depende não apenas do aperfeiçoamento legislativo, mas, principalmente, da fiscalização rigorosa, da inclusão econômica e da mudança cultural quanto à diversidade humana.","argumentos":[{"ideia":"O EPD adotou modelo biopsicossocial, superando o modelo médico puro","repertorio":"Lei 13.146/2015 art. 2º - avaliação biopsicossocial. Convenção da ONU sobre os Direitos das Pessoas com Deficiência (status de emenda constitucional). Princípio da dignidade da pessoa humana (CF art. 1º, III)."},{"ideia":"Cotas em concursos e empregos enfrentam descumprimento e necessitam fiscalização","repertorio":"CF art. 37, VIII (cotas em concursos públicos). Lei 8.213/1991 art. 93 (cotas em empresas privadas). Resoluções CNJ 230/2016 e 401/2021 - acessibilidade no Judiciário. Decreto 9.508/2018."}],"proposta":"Compete ao Ministério da Igualdade Racial, em parceria com o MP do Trabalho e os conselhos estaduais de PCD, implementar plataforma nacional de denúncia e fiscalização contínua das cotas, com publicação anual de ranking de cumprimento por órgão público e empresa.","conectivos":["Nessa perspectiva","Sob esse prisma","Não obstante","Logo","Em arremate"],"cuidados":["Mencionar o EPD (Lei 13.146/2015) com número","Diferenciar barreiras físicas e atitudinais","Citar instrumento de cotas","Proposta com agente claro"]}},{"id":5,"titulo":"A morosidade do Poder Judiciário e o direito fundamental à duração razoável do processo","eixo":"Direito Processual / Judiciário","abordagem":"CF art. 5º, LXXVIII; CNJ; produtividade; meios consensuais de solução de conflitos.","espelho":{"contextualizacao":"O Brasil ostenta um dos maiores acervos processuais do mundo: o Relatório Justiça em Números 2024 do CNJ contabilizou mais de 80 milhões de processos pendentes. A demora compromete o direito fundamental insculpido no art. 5º, LXXVIII, da CF, introduzido pela EC 45/2004.","tese":"A morosidade judicial não decorre apenas da insuficiência de recursos, mas, sobretudo, da cultura demandista e do baixo aproveitamento dos meios consensuais, exigindo resposta institucional articulada.","argumentos":[{"ideia":"O número desproporcional de demandas reflete uma cultura adversarial","repertorio":"Resolução CNJ 125/2010 - Política Judiciária Nacional de tratamento adequado de conflitos. Lei 13.140/2015 (Mediação). Justiça em Números: taxa de congestionamento de 70% em alguns tribunais."},{"ideia":"O processo eletrônico e a IA podem aumentar a produtividade","repertorio":"PJe e eproc. Programa Justiça 4.0 (CNJ). Resoluções CNJ 332/2020 (IA no Judiciário) e 345/2020 (Juízo 100% digital). Lei 11.419/2006 (processo eletrônico)."}],"proposta":"Compete ao CNJ, em parceria com tribunais estaduais e federais, expandir os CEJUSCs (Centros Judiciários de Solução de Conflitos) e condicionar parcela da promoção dos magistrados ao percentual de acordos homologados, incentivando a cultura consensual.","conectivos":["Nesse sentido","De outro giro","Cumpre destacar","À luz do exposto","Por todo o exposto"],"cuidados":["Citar dados do CNJ","Mencionar art. 5º, LXXVIII","Equilibrar autocrítica e propostas","Não atribuir a culpa só ao Judiciário"]}},{"id":6,"titulo":"Violência contra a mulher: marcos legais e desafios para sua erradicação","eixo":"Direitos Humanos","abordagem":"Lei Maria da Penha (11.340/2006), Lei do Feminicídio, Patrulha Maria da Penha, juizados especializados.","espelho":{"contextualizacao":"O Brasil convive com índices alarmantes de violência contra a mulher: o Anuário Brasileiro de Segurança Pública 2024 registrou mais de 1.300 feminicídios no último período medido. Apesar dos marcos legais avançados, a efetividade da proteção ainda é deficiente.","tese":"A erradicação da violência contra a mulher exige a articulação entre rigor punitivo, acolhimento institucional integral e mudança cultural do imaginário patriarcal, conforme orienta a Lei 11.340/2006.","argumentos":[{"ideia":"A Lei Maria da Penha trouxe estrutura jurídica robusta, mas requer rede de proteção articulada","repertorio":"Lei 11.340/2006 - medidas protetivas (art. 22). Lei 13.104/2015 (Feminicídio - CP art. 121, §2º, VI). Lei 14.310/2022 (Patrulha Maria da Penha). CNJ Recomendação 128/2022."},{"ideia":"O subnotificação revela a necessidade de mudança cultural e acolhimento qualificado","repertorio":"Convenção de Belém do Pará (Decreto 1.973/1996). Programa Mulher Viver sem Violência. Casas da Mulher Brasileira. Atendimento via Ligue 180."}],"proposta":"Compete ao Ministério das Mulheres, em parceria com TJs e Defensorias, ampliar a instalação de Juizados de Violência Doméstica em municípios de médio porte e capacitar policiais civis e militares em escuta especializada, prevenindo a revitimização.","conectivos":["Nesse contexto","Outrossim","Em que pese","Sendo assim","Em arremate"],"cuidados":["Citar Lei 11.340/2006 e o feminicídio (Lei 13.104/2015)","Dados oficiais (Anuário Segurança Pública)","Evitar tratamento genérico","Proposta articulada"]}},{"id":7,"titulo":"Combate à corrupção e improbidade administrativa no Brasil pós-Lei 14.230/2021","eixo":"Direito Administrativo","abordagem":"Alterações na Lei 8.429/1992: dolo específico, prescrição, acordo de não persecução cível.","espelho":{"contextualizacao":"A Lei 14.230/2021 promoveu reforma profunda na Lei de Improbidade Administrativa (8.429/1992), exigindo dolo específico e redesenhando o regime sancionatório. As alterações suscitam debate sobre se representam avanço ou recuo no combate à corrupção.","tese":"O novo regime de improbidade, embora mais garantista, precisa ser complementado por mecanismos de prevenção (compliance público) e cooperação interinstitucional para não esvaziar o combate à corrupção.","argumentos":[{"ideia":"A exigência de dolo específico aumenta a segurança jurídica mas dificulta a responsabilização","repertorio":"Lei 14.230/2021 art. 1º, §1º - exige vontade livre e consciente de obter o resultado ilícito. STF Tema 1.199 - irretroatividade aos atos culposos. CF art. 5º, LIV - devido processo."},{"ideia":"O acordo de não persecução cível permite eficiência sem sacrificar o interesse público","repertorio":"Lei 14.230/2021 art. 17-B. Resolução CNMP 264/2024. Acórdão STF ADI 7.236 (constitucionalidade do ANPC)."}],"proposta":"Cabe à CGU, em conjunto com TCU e CNJ, implementar programa nacional de compliance público obrigatório em todos os órgãos federais, com indicadores objetivos de transparência e integridade, condicionando repasses voluntários ao cumprimento.","conectivos":["Nesse panorama","Por outro lado","Cumpre observar","Por conseguinte","Em conclusão"],"cuidados":["Citar Lei 14.230/2021 com número","Mencionar STF Tema 1.199","Não defender simplesmente o retorno ao regime antigo","Proposta preventiva"]}},{"id":8,"titulo":"O impacto das redes sociais sobre o debate público e a democracia","eixo":"Sociedade / Democracia","abordagem":"Desinformação, fake news, polarização, regulação de plataformas, Marco Civil da Internet.","espelho":{"contextualizacao":"As redes sociais reconfiguraram o espaço público no século XXI. Se democratizaram o acesso à voz pública, também potencializaram a disseminação de desinformação, ataques à integridade eleitoral e à honra alheia.","tese":"A regulação responsável das redes sociais é imprescindível à preservação democrática, devendo equilibrar liberdade de expressão (CF art. 5º, IV e IX) e proteção de direitos fundamentais.","argumentos":[{"ideia":"A desinformação ameaça a esfera pública e o processo eleitoral","repertorio":"Resolução TSE 23.610/2019 e Res. TSE 23.732/2024 (combate à desinformação). PL 2.630/2020 (PL das Fake News, em tramitação). Conceito de 'fake news' (Hannah Arendt sobre a mentira na política)."},{"ideia":"O Marco Civil da Internet e a LGPD oferecem bases para a regulação","repertorio":"Lei 12.965/2014 art. 19 - responsabilização de provedores. Lei 13.709/2018 (LGPD). STF ADPF 779 (combate à incitação à violência)."}],"proposta":"Cabe ao Congresso Nacional, com participação da sociedade civil e do MP Eleitoral, aprovar legislação que imponha às plataformas dever de transparência sobre algoritmos de moderação e tempo de resposta para conteúdo ilícito, sob pena de responsabilização.","conectivos":["Sob esse prisma","Em contrapartida","Não se pode olvidar","Diante disso","Posto isso"],"cuidados":["Equilibrar liberdade de expressão e regulação","Citar Marco Civil e LGPD","Não defender censura","Proposta com agente apropriado"]}},{"id":9,"titulo":"A proteção de dados pessoais no Brasil: avanços e desafios da LGPD","eixo":"Direito Digital","abordagem":"Lei 13.709/2018, ANPD, direitos do titular, bases legais, tratamento por órgãos públicos.","espelho":{"contextualizacao":"A entrada em vigor da Lei Geral de Proteção de Dados (Lei 13.709/2018) marcou o ingresso do Brasil na vanguarda da proteção da privacidade no ambiente digital. Cinco anos depois, o cenário ainda apresenta lacunas na implementação.","tese":"A consolidação da LGPD depende do fortalecimento da ANPD, da capacitação técnica dos órgãos públicos e da conscientização social sobre os direitos dos titulares de dados.","argumentos":[{"ideia":"A LGPD reconhece a privacidade como direito fundamental e estabelece bases legais para tratamento","repertorio":"Lei 13.709/2018 art. 7º - 10 bases legais. STF ADI 6.387 (LGPD como direito fundamental). EC 115/2022 - inseriu a proteção de dados no art. 5º, LXXIX da CF."},{"ideia":"O setor público enfrenta dificuldades para adequação plena","repertorio":"ANPD - Autoridade Nacional de Proteção de Dados. Decreto 11.348/2023 (DPO no setor público). Resolução CNJ 363/2021 (LGPD no Judiciário). TCU acórdãos sobre LGPD."}],"proposta":"Compete à ANPD, em parceria com a ENAP, oferecer trilha formativa nacional gratuita em proteção de dados para todos os servidores públicos federais, estaduais e municipais, com certificação obrigatória para encarregados (DPOs).","conectivos":["Nesse contexto","Sob essa ótica","Cumpre ressaltar","Logo","Em síntese"],"cuidados":["Citar Lei 13.709/2018 e a ANPD","Mencionar EC 115/2022","Não confundir privacidade com segredo","Proposta exequível"]}},{"id":10,"titulo":"Sustentabilidade e ESG na Administração Pública","eixo":"Sustentabilidade","abordagem":"Lei 14.133/2021 e desenvolvimento sustentável, compras verdes, eficiência energética.","espelho":{"contextualizacao":"A Administração Pública é hoje o maior comprador do país, e suas escolhas têm impacto direto na cadeia produtiva. A consagração do desenvolvimento nacional sustentável como princípio licitatório, na Lei 14.133/2021, abriu caminho para que o ESG (Environmental, Social, Governance) ingressasse na pauta estatal.","tese":"A integração de critérios ESG na gestão pública é instrumento eficaz de transformação social, devendo ser aprofundada por meio das compras verdes, da eficiência energética e do compliance ambiental.","argumentos":[{"ideia":"A NLLC consagrou o desenvolvimento sustentável como princípio","repertorio":"Lei 14.133/2021 art. 5º - princípios; art. 11, IV - promoção do desenvolvimento nacional sustentável. Decreto 7.746/2012 (compras públicas sustentáveis). Acórdão TCU 1.752/2011 - critérios ambientais."},{"ideia":"Casos práticos demonstram resultados","repertorio":"A3P - Agenda Ambiental na Administração Pública. ODS da ONU (Agenda 2030). Lei 12.305/2010 (Política Nacional de Resíduos Sólidos). Acordos voluntários como o Pacto Global da ONU."}],"proposta":"Compete ao Ministério da Gestão, em conjunto com o MMA, condicionar repasses voluntários e participação em programas federais à comprovação, pelos entes subnacionais, de plano municipal/estadual ESG, contendo metas mensuráveis e auditadas anualmente.","conectivos":["Nesse panorama","Outrossim","Por outro lado","Em consequência","Conclui-se"],"cuidados":["Citar Lei 14.133/2021","Mencionar ODS","Equilibrar dimensão ambiental, social e governança","Proposta com agente claro"]}},{"id":11,"titulo":"O sistema prisional brasileiro: superlotação, ressocialização e direitos humanos","eixo":"Direitos Humanos / Penal","abordagem":"LEP (Lei 7.210/1984), audiência de custódia, monitoramento eletrônico, Defensoria Pública.","espelho":{"contextualizacao":"Com mais de 800 mil presos, o Brasil tem a terceira maior população carcerária do mundo. O STF, ao julgar a ADPF 347, declarou o sistema penitenciário em 'estado de coisas inconstitucional', diagnóstico que persiste desafiador.","tese":"A crise do sistema prisional brasileiro exige resposta sistêmica, com foco em desencarceramento provisório, ressocialização efetiva e fortalecimento do controle judicial sobre a execução penal.","argumentos":[{"ideia":"A audiência de custódia e o monitoramento eletrônico reduzem encarceramento desnecessário","repertorio":"CPP art. 310 (audiência de custódia, EC e Lei 13.964/2019). Resolução CNJ 213/2015. Pacto de São José da Costa Rica art. 7.5. Tornozeleira eletrônica - Lei 12.258/2010."},{"ideia":"A ressocialização exige educação, trabalho e assistência prevista na LEP","repertorio":"Lei 7.210/1984 - arts. 10-27 (assistência), arts. 28-37 (trabalho), arts. 17-21 (educação - remição). Súmula 562 STJ - remição por estudo. ADPF 347/STF."}],"proposta":"Cabe ao Ministério da Justiça e Segurança Pública, com aporte do FUNPEN e parceria das Secretarias Estaduais de Administração Penitenciária, expandir programas de trabalho e estudo em ao menos 70% das unidades prisionais até 2030, vinculando remição efetiva à carga horária prestada.","conectivos":["Nesse cenário","Em paralelo","Não obstante","Diante do exposto","Por todo o exposto"],"cuidados":["Citar a LEP e a ADPF 347","Não defender solução simplista","Não esquecer da ressocialização","Proposta orçamentariamente viável"]}},{"id":12,"titulo":"A função social do servidor público e os princípios da Administração Pública","eixo":"Administração Pública","abordagem":"Princípios do art. 37 CF, ética, eficiência, atendimento ao cidadão, Lei 8.112/1990.","espelho":{"contextualizacao":"O servidor público é o agente que materializa o Estado no cotidiano do cidadão. Sua atuação, balizada pelos princípios do art. 37 da CF, é fundamental para a concretização das políticas públicas e para a confiança institucional.","tese":"A função social do servidor público realiza-se na adesão ética aos princípios constitucionais, especialmente eficiência, impessoalidade e moralidade, viabilizando o pacto de cidadania.","argumentos":[{"ideia":"O servidor é agente de cidadania, não mero executor burocrático","repertorio":"CF art. 37, caput - LIMPE. Lei 8.112/1990 art. 116 (deveres) e art. 117 (proibições). Decreto 1.171/1994 (Código de Ética). Hely Lopes Meirelles - 'Estado é meio, não fim'."},{"ideia":"A eficiência (EC 19/1998) impõe contínuo aprimoramento","repertorio":"Lei 8.112/1990 art. 87 (capacitação) e art. 41, §1º (avaliação especial). Lei 11.892/2008 (Rede Federal de Educação). Programa Nacional de Desenvolvimento de Pessoas."}],"proposta":"Compete à ENAP, em parceria com as escolas de governo estaduais, ofertar trilha contínua de educação ética e de excelência no atendimento ao cidadão, com avaliação periódica e integração à promoção funcional.","conectivos":["Nesse panorama","Sob essa ótica","Por conseguinte","Em síntese","Por todo o exposto"],"cuidados":["Citar art. 37 da CF e Lei 8.112/1990","Não cair em moralismo vazio","Proposta clara","Equilibrar direitos e deveres"]}},{"id":13,"titulo":"Os impactos da reforma trabalhista e da Lei do Teletrabalho na sociedade brasileira","eixo":"Direito do Trabalho / Sociedade","abordagem":"Lei 13.467/2017, Lei 14.442/2022, home office, direito à desconexão.","espelho":{"contextualizacao":"A Lei 13.467/2017 promoveu a maior reforma trabalhista brasileira desde a CLT, e a Lei 14.442/2022 regulou o teletrabalho. Em conjunto, esses marcos legais transformaram a relação capital-trabalho no país, suscitando debates sobre seus efeitos.","tese":"A nova arquitetura trabalhista brasileira ampliou flexibilidade e produtividade, mas exige equilíbrio com a proteção do trabalhador, sobretudo quanto ao direito à desconexão e à saúde mental.","argumentos":[{"ideia":"A reforma trazia o prometido aumento de empregos formais, com resultados ambíguos","repertorio":"Lei 13.467/2017 - intermitente, terceirização, prevalência do negociado sobre o legislado. Pesquisa IPEA mostrou efeito controverso sobre formalização. Princípio da proteção (Plá Rodrigues)."},{"ideia":"O teletrabalho exige novos paradigmas de tutela","repertorio":"Lei 14.442/2022 (alterou CLT arts. 75-A a 75-F). Direito à desconexão (TST). NR 17 - ergonomia. ILO Convenção 190 (assédio)."}],"proposta":"Compete ao MPT e aos sindicatos, em diálogo com a Câmara dos Deputados, fortalecer o direito à desconexão por meio de norma de saúde ocupacional vinculante e fiscalização rigorosa do cumprimento das jornadas em teletrabalho.","conectivos":["Nesse contexto","Em contrapartida","Cumpre destacar","Por essa razão","Em conclusão"],"cuidados":["Equilibrar reforma trabalhista e direitos do trabalhador","Citar as duas leis","Mencionar direito à desconexão","Proposta com agente concreto"]}},{"id":14,"titulo":"Mediação e conciliação como alternativas à judicialização excessiva","eixo":"Justiça","abordagem":"Lei 13.140/2015, CEJUSCs, semana nacional da conciliação, Resolução 125 CNJ.","espelho":{"contextualizacao":"O excesso de litigiosidade no Brasil, com mais de 80 milhões de processos pendentes (CNJ Justiça em Números 2024), tornou a busca por meios consensuais uma política pública prioritária. A Resolução CNJ 125/2010 e a Lei 13.140/2015 estabeleceram as bases normativas dessa transformação cultural.","tese":"A consolidação da cultura de mediação e conciliação no Brasil depende de mudança paradigmática nos operadores do direito, de incentivos institucionais aos consensos e da ampla informação ao cidadão.","argumentos":[{"ideia":"Os métodos consensuais reduzem custos sociais e devolvem o protagonismo às partes","repertorio":"Lei 13.140/2015 (Mediação - art. 2º princípios). CPC arts. 165-175 (conciliadores e mediadores). Lei 9.307/1996 (Arbitragem). Resolução CNJ 125/2010."},{"ideia":"Os CEJUSCs comprovam eficiência mas demandam expansão e qualificação","repertorio":"Semana Nacional da Conciliação (CNJ). Modelo Multiportas (Frank Sander). Resolução CNJ 350/2020 (cooperação judicial). Justiça 4.0 - audiências telepresenciais."}],"proposta":"Cabe ao CNJ, em articulação com a OAB e Defensorias, instituir programa nacional de incentivo à mediação pré-processual gratuita, em parceria com universidades, e veicular campanha pública sobre o direito à solução consensual.","conectivos":["Nesse sentido","Outrossim","Não obstante","Sob essa perspectiva","Ante o exposto"],"cuidados":["Citar Lei 13.140/2015 e Res. CNJ 125","Mencionar CEJUSCs","Não negar valor da via judicial","Proposta voltada à cultura"]}},{"id":15,"titulo":"Cibersegurança e proteção das instituições públicas brasileiras","eixo":"Segurança Digital","abordagem":"Ataques cibernéticos, soberania de dados, GovBR, capacitação técnica, Lei 14.063/2020.","espelho":{"contextualizacao":"Os ataques cibernéticos a órgãos públicos brasileiros multiplicaram-se nos últimos anos, com episódios marcantes em tribunais (STJ, 2020) e órgãos do Executivo. A consolidação digital do Estado exige resposta proporcional em cibersegurança.","tese":"A proteção do patrimônio informacional do Estado depende da estruturação de marco regulatório próprio, da capacitação técnica permanente e da cooperação interinstitucional, sob pena de comprometer serviços essenciais.","argumentos":[{"ideia":"O Estado brasileiro digitalizou serviços sem proteção proporcional","repertorio":"Decreto 10.222/2020 (E-Ciber - Estratégia Nacional de Cibersegurança). LGPD - art. 46. Programa GovBR. Lei 14.063/2020 (assinatura eletrônica)."},{"ideia":"A capacitação técnica é o gargalo crítico","repertorio":"GSI (Gabinete de Segurança Institucional). CGD-PR (Comitê Gestor da Segurança da Informação). Estudos do CERT.br sobre incidentes. Pesquisa do TCU sobre maturidade de TI."}],"proposta":"Compete ao GSI e à ENAP, em conjunto com SERPRO e DATAPREV, instituir programa nacional de capacitação obrigatória em cibersegurança para todos os servidores que tratam dados sensíveis, com ce const STORAGE_KEY = 'tjce_candidato_v3';
const IDB_NAME = 'tjce_db';
const IDB_VERSION = 2;
const IDB_STORE_STATE = 'state';
const IDB_STORE_SNAPSHOTS = 'snapshots';
const IDB_STORE_META = 'meta';
const STATE_KEY = 'current';
const SNAPSHOT_MAX = 7;          // máximo de snapshots automáticos retidos
const SNAPSHOT_INTERVAL_MS = 86400000; // novo snapshot a cada 24h
const FS_HANDLE_KEY = 'sync_dir_handle';
const FS_SYNC_FILENAME = 'tjce_backup_auto.json';

const corPrioridade = (p) => p === 'ALTA' ? 'bg-orange-100 text-orange-800 border-orange-300'
  : p === 'MÉDIA' ? 'bg-yellow-100 text-yellow-800 border-yellow-300'
  : 'bg-blue-100 text-blue-800 border-blue-300';

// ===================== STORAGE (IndexedDB + localStorage como espelho) =====================
// Filosofia: IndexedDB é o storage primário (mais robusto, maior quota, protegido por persist()).
// localStorage é mantido como espelho redundante e como fallback síncrono para o boot inicial.
// Se um dos dois falha/é apagado, o outro pode restaurar.

let _idbPromise = null;
function idbOpen() {
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error('IndexedDB indisponível')); return; }
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (ev) => {
      const db = ev.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE_STATE)) db.createObjectStore(IDB_STORE_STATE);
      if (!db.objectStoreNames.contains(IDB_STORE_SNAPSHOTS)) db.createObjectStore(IDB_STORE_SNAPSHOTS);
      if (!db.objectStoreNames.contains(IDB_STORE_META)) db.createObjectStore(IDB_STORE_META);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _idbPromise;
}
function idbGet(store, key) {
  return idbOpen().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const r = tx.objectStore(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  }));
}
function idbSet(store, key, value) {
  return idbOpen().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const r = tx.objectStore(store).put(value, key);
    r.onsuccess = () => res(true);
    r.onerror = () => rej(r.error);
  }));
}
function idbGetAllWithKeys(store) {
  return idbOpen().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const os = tx.objectStore(store);
    const keysReq = os.getAllKeys();
    const valsReq = os.getAll();
    let keys, vals;
    keysReq.onsuccess = () => { keys = keysReq.result; if (vals) res(keys.map((k,i) => ({ key: k, value: vals[i] }))); };
    valsReq.onsuccess = () => { vals = valsReq.result; if (keys) res(keys.map((k,i) => ({ key: k, value: vals[i] }))); };
    keysReq.onerror = valsReq.onerror = () => rej(keysReq.error || valsReq.error);
  }));
}
function idbDelete(store, key) {
  return idbOpen().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const r = tx.objectStore(store).delete(key);
    r.onsuccess = () => res(true);
    r.onerror = () => rej(r.error);
  }));
}

// loadState síncrono: lê localStorage para boot rápido. Se não houver nada, retorna default.
// loadStateAsync (chamado após o mount) tenta ler do IDB e preferir o mais recente.
function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return migrarEstado(JSON.parse(raw)); } catch(e) {}
  return defaultState();
}
async function loadStateAsync() {
  try {
    const idbData = await idbGet(IDB_STORE_STATE, STATE_KEY);
    if (idbData) return migrarEstado(typeof idbData === 'string' ? JSON.parse(idbData) : idbData);
  } catch (e) { /* IDB pode não estar disponível em modo privado */ }
  return null;
}

// saveState: escreve em localStorage (síncrono, imediato) E em IDB (assíncrono, fire-and-forget).
// Dupla escrita garante que qualquer um dos dois sirva como fallback.
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
  // IDB save: descartar erro silenciosamente para não quebrar a UI
  idbSet(IDB_STORE_STATE, STATE_KEY, s).catch(()=>{});
}

// Pede ao navegador para tornar o storage persistente (resiste a limpezas automáticas).
// Em iOS/Safari geralmente retorna false; em Chrome/Firefox com PWA instalado tende a true.
async function pedirPersistencia() {
  try {
    if (navigator.storage && navigator.storage.persist) {
      const jaPersistente = await navigator.storage.persisted();
      if (jaPersistente) return { persisted: true, requested: false };
      const concedido = await navigator.storage.persist();
      return { persisted: concedido, requested: true };
    }
  } catch(e) {}
  return { persisted: false, requested: false, indisponivel: true };
}

// Estima uso e quota de storage (em bytes). Útil para diagnóstico na tela de Backup.
async function estimarStorage() {
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const e = await navigator.storage.estimate();
      return { usage: e.usage || 0, quota: e.quota || 0 };
    }
  } catch(e) {}
  return null;
}

// Snapshots automáticos rotativos: snapshot do estado a cada SNAPSHOT_INTERVAL_MS,
// mantendo no máximo SNAPSHOT_MAX. Não substitui o backup manual (que sai do dispositivo),
// mas protege contra corrupção do estado e oferece "voltar 1-7 dias" em caso de problema.
async function criarSnapshotSeNecessario(state) {
  try {
    const todos = await idbGetAllWithKeys(IDB_STORE_SNAPSHOTS);
    const ordenados = todos.sort((a,b) => Number(b.key) - Number(a.key));
    const agora = Date.now();
    if (ordenados.length > 0 && (agora - Number(ordenados[0].key)) < SNAPSHOT_INTERVAL_MS) return false;
    await idbSet(IDB_STORE_SNAPSHOTS, String(agora), {
      timestamp: agora,
      estado: state,
    });
    // Rotação: apaga snapshots excedentes
    const novosTodos = await idbGetAllWithKeys(IDB_STORE_SNAPSHOTS);
    const novosOrdenados = novosTodos.sort((a,b) => Number(b.key) - Number(a.key));
    for (let i = SNAPSHOT_MAX; i < novosOrdenados.length; i++) {
      await idbDelete(IDB_STORE_SNAPSHOTS, novosOrdenados[i].key);
    }
    return true;
  } catch(e) { return false; }
}

async function listarSnapshots() {
  try {
    const todos = await idbGetAllWithKeys(IDB_STORE_SNAPSHOTS);
    return todos
      .map(t => ({ id: t.key, timestamp: t.value?.timestamp || Number(t.key), estado: t.value?.estado }))
      .filter(s => s.estado)
      .sort((a,b) => b.timestamp - a.timestamp);
  } catch(e) { return []; }
}

// ===================== WEB SHARE API =====================
// Em iOS/Safari, permite mandar o backup direto para iCloud Drive, Mail, AirDrop, etc.
// Em Android, abre o share sheet nativo. Em desktop, depende do navegador.
function webShareSuportado() {
  return !!(navigator.share && navigator.canShare);
}
async function compartilharBackup(state) {
  const payload = {
    __app__: 'tjce_centro_estudos',
    __versao__: state.versao || 4,
    __exportado_em__: new Date().toISOString(),
    estado: { ...state, ultimo_backup: new Date().toISOString() }
  };
  const stamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
  const nomeSlug = (state.nome_candidato || 'candidato').toLowerCase().replace(/[^a-z0-9]/g, '_').substring(0, 20);
  const nome = `tjce_backup_${nomeSlug}_${stamp}.json`;
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const file = new File([blob], nome, { type: 'application/json' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: 'Backup TJ-CE', text: 'Backup do meu progresso de estudos' });
    return { ok: true };
  }
  // Fallback: share só com texto + url (resumo) — não traz o arquivo
  if (navigator.share) {
    await navigator.share({ title: 'Backup TJ-CE', text: 'Não foi possível compartilhar o arquivo direto neste dispositivo. Use o botão Exportar.' });
    return { ok: false, motivo: 'sem_arquivo' };
  }
  return { ok: false, motivo: 'indisponivel' };
}

// ===================== FILE SYSTEM ACCESS API (sync auto com pasta sincronizada) =====================
// O usuário escolhe uma vez uma pasta (idealmente já sincronizada por Drive/OneDrive/iCloud Desktop).
// O app guarda o handle no IDB e, a cada save importante, grava tjce_backup_auto.json nessa pasta.
// O serviço de sync do dispositivo se encarrega de levar o arquivo para a nuvem.
// Suporte: Chrome/Edge desktop, Android Chrome. NÃO funciona em Firefox/Safari.

function fsAccessSuportado() {
  return typeof window !== 'undefined' && typeof window.showDirectoryPicker === 'function';
}
async function conectarPastaSync() {
  if (!fsAccessSuportado()) throw new Error('File System Access API não suportada neste navegador');
  const handle = await window.showDirectoryPicker({ mode: 'readwrite', id: 'tjce-sync' });
  // Confirma permissão de leitura/escrita
  const perm = await handle.requestPermission({ mode: 'readwrite' });
  if (perm !== 'granted') throw new Error('Permissão de escrita negada');
  await idbSet(IDB_STORE_META, FS_HANDLE_KEY, handle);
  return handle;
}
async function getPastaSyncHandle() {
  try { return await idbGet(IDB_STORE_META, FS_HANDLE_KEY); } catch(e) { return null; }
}
async function statusPastaSync() {
  const handle = await getPastaSyncHandle();
  if (!handle) return { conectada: false };
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    return { conectada: true, permissao: perm, nome: handle.name };
  } catch(e) {
    return { conectada: true, permissao: 'unknown', nome: handle.name, erro: e.message };
  }
}
async function pedirPermissaoPastaSync() {
  const handle = await getPastaSyncHandle();
  if (!handle) return 'sem_handle';
  return await handle.requestPermission({ mode: 'readwrite' });
}
async function desconectarPastaSync() {
  await idbDelete(IDB_STORE_META, FS_HANDLE_KEY);
}
async function gravarBackupNaPastaSync(state, opts = {}) {
  const handle = await getPastaSyncHandle();
  if (!handle) return { ok: false, motivo: 'sem_handle' };
  let perm = await handle.queryPermission({ mode: 'readwrite' });
  if (perm !== 'granted') {
    if (opts.solicitar) perm = await handle.requestPermission({ mode: 'readwrite' });
    if (perm !== 'granted') return { ok: false, motivo: 'sem_permissao' };
  }
  try {
    const fileHandle = await handle.getFileHandle(FS_SYNC_FILENAME, { create: true });
    const writable = await fileHandle.createWritable();
    const payload = {
      __app__: 'tjce_centro_estudos',
      __versao__: state.versao || 4,
      __exportado_em__: new Date().toISOString(),
      __auto_sync__: true,
      estado: { ...state, ultimo_backup: new Date().toISOString() }
    };
    await writable.write(JSON.stringify(payload, null, 2));
    await writable.close();
    return { ok: true, timestamp: Date.now() };
  } catch(e) {
    return { ok: false, motivo: 'erro_escrita', erro: e.message };
  }
}

// ===================== PENDÊNCIAS (cumprimento parcial + realocação para domingo) =====================
// Helper: identifica se um dia do cronograma é um "domingo de pendências" disponível.
// Critério: dia_sem === "Domingo" AND atividade começa com "Pendências" (exclui domingos de simulado e prova).
function ehDomingoDePendencias(plano) {
  if (!plano) return false;
  return plano.dia_sem === 'Domingo' &&
         plano.tipo === 'Domingo' &&
         typeof plano.atividade === 'string' &&
         plano.atividade.toLowerCase().startsWith('pendências');
}
// Encontra o próximo domingo de pendências a partir de uma data (ISO).
// Se não houver nenhum domingo disponível pela frente, tenta o sábado de revisão final (id 81 - tipo "RevisãoFinal" com "Quadro de Apostas e Erros").
// Se nem isso, retorna null (pendência sem destino — fica visível como aviso).
function proximoDestinoPendencia(dataOrigemISO) {
  const candidatos = DADOS.cronograma.filter(p => p.data > dataOrigemISO);
  const domingoDisponivel = candidatos.find(ehDomingoDePendencias);
  if (domingoDisponivel) return domingoDisponivel.id;
  // Fallback: sábado de pendências da semana final (busca por atividade contendo "Quadro de Apostas e Erros" não-domingo)
  const fallback = candidatos.find(p =>
    p.dia_sem === 'Sábado' &&
    typeof p.atividade === 'string' &&
    p.atividade.toLowerCase().includes('apostas e erros')
  );
  return fallback ? fallback.id : null;
}
// Retorna lista de pendências (não concluídas) alocadas para um dia específico
function pendenciasDoDia(state, diaId) {
  return (state.pendencias || []).filter(p => p.alocada_para_dia_id === diaId && !p.concluida);
}
// Gera id curto para pendência
function novoIdPendencia() {
  return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}

const CONECTIVOS = [
  'portanto','todavia','entretanto','contudo','porém','assim','logo','ademais','outrossim',
  'consequentemente','destarte','visto que','uma vez que','tendo em vista','embora','apesar de',
  'não obstante','por conseguinte','em virtude','em razão','a fim de','com efeito','dessa forma',
  'nesse sentido','nessa perspectiva','sob essa ótica','por outro lado','em contrapartida',
  'cumpre destacar','cumpre observar','cumpre ressaltar','convém destacar','sob esse prisma',
  'diante do exposto','à guisa de conclusão','em arremate','por essa razão','sendo assim','em síntese',
  'por todo o exposto','em conclusão','à luz do exposto','ante o exposto'
];

const STOPWORDS = new Set(['para','desde','assim','entre','sobre','ainda','muito','mesmo','dessa',
  'desse','desta','deste','nesta','neste','também','quando','como','porque','contra','sendo',
  'quanto','enquanto','onde','sempre','outros','outras','algum','alguns','algumas','nenhum',
  'todos','todas','dentro','depois','antes','contudo','apenas','pode','poderia','sobre',
  'pelas','pelos','dela','dele','delas','deles','seria','seriam','foram','está','estão',
  'tem','têm','sua','seu','suas','seus','minha','meu','minhas','meus','nossa','nosso']);

function analisarTexto(texto) {
  if (!texto || !texto.trim()) return null;
  const palavras = texto.trim().split(/\s+/).filter(p => p.length > 0);
  const numPalavras = palavras.length;
  const paragrafos = texto.split(/\n\s*\n/).filter(p => p.trim().length > 0);
  const numParagrafos = paragrafos.length;
  const linhasEstimadas = Math.round(numPalavras / 8.5);
  
  const textoLower = texto.toLowerCase();
  const conectivosUsados = CONECTIVOS.filter(c => textoLower.includes(c));
  
  // Repertório jurídico
  const leis = (texto.match(/Lei\s+(n[º°]?\s*)?\d[\d.\/]*\d/gi) || []).length;
  const artigos = (texto.match(/art(?:igo|\.)\s*\d/gi) || []).length;
  const cf = (texto.match(/CF\/?\d*|Constituição Federal|carta magna/gi) || []).length;
  const stf = (texto.match(/STF|Supremo|Tema\s+\d+|Súmula|ADI|ADC|ADPF|RE\s+\d|REsp\s+\d/gi) || []).length;
  const totalRepertorio = leis + artigos + cf + stf;
  
  // Repetições (palavras com 5+ letras, 4+ ocorrências)
  const contagem = {};
  palavras.forEach(p => {
    const lower = p.toLowerCase().replace(/[.,;:!?()"'"`]/g, '');
    if (lower.length >= 5 && !STOPWORDS.has(lower) && !/^\d+$/.test(lower)) {
      contagem[lower] = (contagem[lower] || 0) + 1;
    }
  });
  const repetidas = Object.entries(contagem).filter(([_, c]) => c >= 4)
    .map(([p, c]) => ({palavra: p, ocorrencias: c}))
    .sort((a,b) => b.ocorrencias - a.ocorrencias).slice(0, 5);
  
  // Proposta de intervenção
  const padroesProposta = ['deve-se','cabe ao','é necessário','é preciso','compete','recomenda-se',
    'propõe-se','urge','cabe à','cabe aos','faz-se necessário','impõe-se','necessário se faz'];
  const temProposta = padroesProposta.some(p => textoLower.includes(p));
  
  // Tese (heurística: presença de marcadores típicos no 1º parágrafo)
  const primeiroParag = paragrafos[0] ? paragrafos[0].toLowerCase() : '';
  const marcadoresTese = ['portanto','assim','logo','desse modo','dessa forma','é mister','impende'];
  const temTese = marcadoresTese.some(m => primeiroParag.includes(m));
  
  // Avisos
  const avisos = [];
  if (linhasEstimadas < 20) avisos.push({tipo:'erro', msg:`Texto curto: ~${linhasEstimadas} linhas (mínimo FCC: 20).`});
  if (linhasEstimadas > 30) avisos.push({tipo:'aviso', msg:`Texto longo: ~${linhasEstimadas} linhas (máximo FCC: 30).`});
  if (numParagrafos < 3) avisos.push({tipo:'erro', msg:`Apenas ${numParagrafos} parágrafo(s). Mínimo: 3 (intro+desenvolvimento+conclusão).`});
  if (numParagrafos > 5) avisos.push({tipo:'aviso', msg:`${numParagrafos} parágrafos. Ideal para 20-30 linhas: 4.`});
  if (conectivosUsados.length < 4) avisos.push({tipo:'aviso', msg:`Poucos conectivos (${conectivosUsados.length}). Aumente para fluidez argumentativa.`});
  if (!temProposta) avisos.push({tipo:'erro', msg:'Proposta de intervenção não detectada. FCC penaliza ausência.'});
  if (totalRepertorio < 2) avisos.push({tipo:'aviso', msg:'Pouco repertório jurídico citado. Cite leis, artigos, CF, STF.'});
  if (repetidas.length > 0) avisos.push({tipo:'aviso', msg:`Repetição excessiva de: ${repetidas.slice(0,3).map(r => `"${r.palavra}" (${r.ocorrencias}x)`).join(', ')}.`});
  
  return {
    numPalavras, numParagrafos, linhasEstimadas, conectivosUsados,
    totalRepertorio, leis, artigos, cf, stf,
    repetidas, temProposta, temTese, avisos
  };
}
