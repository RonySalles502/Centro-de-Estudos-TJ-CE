// ===================== APP =====================
function App() {
  const [view, setView] = useState('dashboard');
  const [state, setState] = useState(loadState());
  const [editandoNome, setEditandoNome] = useState(false);
  const [persistStatus, setPersistStatus] = useState(null); // { persisted, requested, indisponivel }
  const stateRef = useRef(state);
  stateRef.current = state;

  // Save dupla (localStorage síncrono + IDB assíncrono) a cada mudança de state
  useEffect(() => { saveState(state); }, [state]);

  // Boot: tentar carregar do IDB (storage primário). Se houver estado mais recente que o
  // do localStorage, sobrescreve. Também solicita persistência e cria snapshot se necessário.
  useEffect(() => {
    (async () => {
      try {
        const idbState = await loadStateAsync();
        if (idbState) {
          // Heurística simples: usa o IDB se ele tiver mais dados que o localStorage
          // (alguma chave principal preenchida). Garante migração transparente.
          const tamLocal = JSON.stringify(stateRef.current).length;
          const tamIdb = JSON.stringify(idbState).length;
          if (tamIdb > tamLocal * 1.05) {
            setState(idbState);
          }
        }
      } catch(e) {}
      // Pedir persistência permanente (resiste a limpezas automáticas do navegador)
      const status = await pedirPersistencia();
      setPersistStatus(status);
      // Snapshot automático se necessário
      await criarSnapshotSeNecessario(stateRef.current);
    })();
  }, []);

  // Flush antes de fechar a aba: garante que o último estado vá para localStorage
  // (IDB pode ficar incompleto numa escrita pendente). Backup contra fechamento abrupto.
  useEffect(() => {
    const handler = () => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stateRef.current)); } catch(e) {}
    };
    window.addEventListener('beforeunload', handler);
    window.addEventListener('pagehide', handler);
    return () => {
      window.removeEventListener('beforeunload', handler);
      window.removeEventListener('pagehide', handler);
    };
  }, []);

  // Snapshot automático periódico: tenta a cada save importante (debounced indiretamente
  // pelo SNAPSHOT_INTERVAL_MS interno do criarSnapshotSeNecessario)
  useEffect(() => {
    const timer = setTimeout(() => { criarSnapshotSeNecessario(stateRef.current).catch(()=>{}); }, 2000);
    return () => clearTimeout(timer);
  }, [state]);

  // Sync automático com pasta File System Access (debounced 5s):
  // Se o usuário conectou uma pasta sincronizada (Drive Desktop, iCloud Drive, etc),
  // grava o backup automaticamente após qualquer mudança de estado.
  // Não pede permissão automaticamente para não atrapalhar o usuário — só grava se já está concedida.
  const [syncStatus, setSyncStatus] = useState(null); // { ultimo, ok, motivo }
  useEffect(() => {
    const timer = setTimeout(async () => {
      const status = await statusPastaSync();
      if (!status.conectada) return;
      if (status.permissao !== 'granted') {
        setSyncStatus({ ok: false, motivo: 'sem_permissao', ultimo: syncStatus?.ultimo });
        return;
      }
      const r = await gravarBackupNaPastaSync(stateRef.current);
      if (r.ok) setSyncStatus({ ok: true, ultimo: r.timestamp, pasta: status.nome });
      else setSyncStatus({ ok: false, motivo: r.motivo, ultimo: syncStatus?.ultimo, pasta: status.nome });
    }, 5000);
    return () => clearTimeout(timer);
  }, [state]);

  // Pedir nome no primeiro acesso
  useEffect(() => {
    if (!state.nome_candidato) setEditandoNome(true);
  }, []);
  
  // Streak
  useEffect(() => {
    const today = hoje();
    setState(s => {
      if (s.streak.ultima_data !== today) {
        const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
        const ontemStr = ontem.toISOString().split('T')[0];
        return { ...s, streak: { ultima_data: today,
          dias_seguidos: s.streak.ultima_data === ontemStr ? s.streak.dias_seguidos + 1 : 1 }};
      }
      return s;
    });
  }, []);
  
  const dias = diasAteProva();
  const totalCiclos = DADOS.cronograma.filter(p => p.c1).length;
  const cont = (st) => (st === 'CUMPRIDO' || st === 'CUMPRIDO_TARDIO') ? 1 : 0;
  const ciclosFeitos = Object.values(state.cronograma_status).reduce((acc, st) =>
    acc + cont(st.c1) + cont(st.c2) + cont(st.c3), 0);
  const pctCronograma = totalCiclos > 0 ? Math.round((ciclosFeitos / (totalCiclos * 3)) * 100) : 0;
  
  const menus = [
    {id:'dashboard', label:'Dashboard', icon:'dashboard'},
    {id:'cronograma', label:'Cronograma', icon:'calendar'},
    {id:'conteudo', label:'Conteúdo do Edital', icon:'book'},
    {id:'questoes', label:'Banco de Questões', icon:'target'},
    {id:'simulados', label:'Simulados', icon:'clipboard'},
    {id:'desempenho', label:'Desempenho', icon:'chart'},
    {id:'redacao', label:'Redação', icon:'pen'},
    {id:'revisao', label:'Revisão Espaçada', icon:'brain'},
    {id:'apostas', label:'Apostas & Erros', icon:'flame'},
    {id:'foco', label:'Foco / Pomodoro', icon:'clock'},
    {id:'notas', label:'Anotações', icon:'note'},
    {id:'backup', label:'Backup & Dados', icon:'db'},
  ];
  
  const nomeExibido = state.nome_candidato || 'Candidato';
  
  return (

        <div className="p-5 border-b border-emerald-600">
          <h1 className="text-xl font-bold">Centro de Estudos</h1>
          <p className="text-xs text-emerald-100 mt-1">TJ-CE 2026 · FCC</p>
          <div className="mt-3 flex items-center gap-2">
            {editandoNome ? (
              <input autoFocus type="text" placeholder="Digite seu nome" defaultValue={state.nome_candidato}
                onBlur={(e) => { setState(s => ({...s, nome_candidato: e.target.value.trim()})); setEditandoNome(false); }}
                onKeyDown={(e) => { if(e.key==='Enter') e.target.blur(); if(e.key==='Escape') setEditandoNome(false); }}
                className="bg-emerald-800 text-white text-xs px-2 py-1 rounded flex-1 ring-focus border border-emerald-400"/>
            ) : (
              <>
                <span className="text-xs text-emerald-200 flex-1">👤 {nomeExibido}</span>

          {menus.map(m => (

              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition ${view === m.id ? 'bg-white text-emerald-800 font-semibold shadow' : 'hover:bg-emerald-600/50'}`}>

              <span className="text-emerald-200">Dias até a prova</span>
              <span className="text-2xl font-bold">{dias}</span>
            </div>
            <div className="mt-2 text-emerald-200 text-[10px]">09/08/2026 · Domingo · Manhã</div>
          </div>
          {state.streak.dias_seguidos > 1 && (
            <div className="mt-2 flex items-center gap-2 text-amber-200 bg-emerald-800/50 rounded px-2 py-1.5">

              <span className="text-xs">{state.streak.dias_seguidos} dias seguidos!</span>

          )}
          {(() => {
            const ub = state.ultimo_backup;
            const diasSemBackup = ub ? Math.floor((new Date() - new Date(ub)) / 86400000) : 999;
            if (diasSemBackup < 7) return null;
            return (
              <button onClick={() => setView('backup')}
                className="mt-2 w-full flex items-center gap-2 text-red-100 bg-red-700/60 hover:bg-red-700 rounded px-2 py-1.5 text-left">

      <main className="flex-1 overflow-y-auto scroll-thin">
        <div className="max-w-6xl mx-auto p-6 fade-in">

          {view === 'conteudo' && <Conteudo state={state} setState={setState}/>}
          {view === 'questoes' && <Questoes state={state} setState={setState}/>}
          {view === 'simulados' && <Simulados state={state} setState={setState}/>}
          {view === 'desempenho' && <Desempenho state={state}/>}
          {view === 'redacao' && <Redacao state={state} setState={setState}/>}
          {view === 'revisao' && <Revisao state={state} setState={setState}/>}
          {view === 'apostas' && <Apostas state={state} setState={setState}/>}
          {view === 'foco' && <Foco state={state} setState={setState}/>}
          {view === 'notas' && <Notas state={state} setState={setState}/>}
          {view === 'backup' && <Backup state={state} setState={setState} persistStatus={persistStatus} syncStatus={syncStatus} setSyncStatus={setSyncStatus}/>}
        </div>
      </main>

  );
}

// ===================== DASHBOARD =====================
function Dashboard({ state, setState, dias, pctCronograma, setView, nomeExibido }) {
  const dataHoje = hoje();
  const planoHoje = DADOS.cronograma.find(p => p.data === dataHoje);
  const proximos = DADOS.cronograma.filter(p => p.data >= dataHoje && p.c1).slice(0, 3);
  const totalQuestoes = DADOS.questoes.length + state.questoes_custom.length;
  const respondidas = Object.keys(state.questoes_estado).length;
  const acertos = Object.values(state.questoes_estado).filter(q => q.acertou).length;
  const pctAcerto = respondidas > 0 ? Math.round(acertos / respondidas * 100) : 0;

  // Análise de pendências adiadas
  const pendenciasAtivas = (state.pendencias || []).filter(p => !p.concluida);
  // Agrupa por dia de destino para identificar domingos sobrecarregados
  const cargaPorDestino = {};
  pendenciasAtivas.forEach(p => {
    const k = p.alocada_para_dia_id ?? 'sem_destino';
    cargaPorDestino[k] = (cargaPorDestino[k] || 0) + 1;
  });
  const destinosSobrecarregados = Object.entries(cargaPorDestino).filter(([k,v]) => k !== 'sem_destino' && v >= 3);
  const semDestino = pendenciasAtivas.filter(p => p.alocada_para_dia_id == null);

  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">Olá, {nomeExibido}! 👋</h2>
      <p className="text-slate-500 mb-6">Pronto para mais um dia de preparação para o TJ-CE.</p>
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <Card title="Dias até a prova" value={dias} subtitle="09/08/2026" color="from-red-500 to-orange-500"/>
        <Card title="Progresso do cronograma" value={`${pctCronograma}%`} subtitle="ciclos cumpridos" color="from-emerald-500 to-green-600"/>
        <Card title="Questões resolvidas" value={respondidas} subtitle={`de ${totalQuestoes} disponíveis`} color="from-blue-500 to-indigo-600"/>
        <Card title="% Acerto geral" value={`${pctAcerto}%`} subtitle={`${acertos}/${respondidas}`} color="from-purple-500 to-pink-500"/>
      </div>

      {/* Bloco de aviso: pendências acumuladas (só aparece se houver) */}
      {pendenciasAtivas.length > 0 && (
        <div className={`mb-6 rounded-xl border p-4 ${semDestino.length > 0 ? 'bg-red-50 border-red-300' : destinosSobrecarregados.length > 0 ? 'bg-amber-50 border-amber-300' : 'bg-violet-50 border-violet-200'}`}>
          <div className="flex items-start justify-between gap-3 flex-wrap">
            <div className="flex-1 min-w-0">
              <div className="font-bold text-slate-800 mb-1">
                📥 {pendenciasAtivas.length} ciclo{pendenciasAtivas.length === 1 ? '' : 's'} adiado{pendenciasAtivas.length === 1 ? '' : 's'} (pendente{pendenciasAtivas.length === 1 ? '' : 's'} de execução)
              </div>
              <div className="text-xs text-slate-700 space-y-1">
                {Object.entries(cargaPorDestino).map(([destId, qtd]) => {
                  if (destId === 'sem_destino') {
                    return <div key={destId} className="text-red-800 font-semibold">⚠ {qtd} pendência{qtd === 1 ? '' : 's'} <strong>sem destino</strong> (não há mais domingos no cronograma).</div>;
                  }
                  const d = DADOS.cronograma.find(c => c.id === Number(destId));
                  if (!d) return null;
                  const sobrecarga = qtd >= 3;
                  return (
                    <div key={destId} className={sobrecarga ? 'text-amber-800 font-semibold' : ''}>
                      {sobrecarga ? '⚠ ' : '• '}
                      {fmtData(d.data)} ({d.dia_sem}): <strong>{qtd}</strong> pendência{qtd === 1 ? '' : 's'} alocada{qtd === 1 ? '' : 's'}
                      {sobrecarga && ' — sobrecarregado'}
                    </div>
                  );
                })}
              </div>
            </div>
            <button onClick={() => setView('cronograma')} className="px-3 py-1.5 bg-violet-600 text-white text-xs rounded font-semibold hover:bg-violet-700">
              Ver no cronograma
            </button>
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
        <div className="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-slate-800">📅 Hoje · {fmtData(dataHoje)}</h3>
            <button onClick={() => setView('cronograma')} className="text-emerald-700 hover:text-emerald-900 text-sm font-medium">Ver cronograma →</button>
          </div>
          {planoHoje ? <DiaDetalhe plano={planoHoje} state={state} setState={setState}/> : (
            <p className="text-slate-500 text-sm">Sem atividade programada para hoje.</p>
          )}
        </div>
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <h3 className="font-bold text-slate-800 mb-4">⏭️ Próximos dias</h3>
          <div className="space-y-3">
            {proximos.map(p => (
              <div key={p.id} className="border-l-2 border-emerald-500 pl-3 py-1">
                <div className="text-xs text-slate-500">{fmtData(p.data)} · {p.dia_sem}</div>
                <div className="text-sm font-medium text-slate-800">{p.c1?.grupo}-{p.c1?.bloco} · {nomeGrupo(p.c1?.grupo)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <QuickAction icon="target" title="Resolver questões" desc={`${totalQuestoes - respondidas} pendentes`} onClick={() => setView('questoes')}/>
        <QuickAction icon="clipboard" title="Aplicar simulado" desc={`${state.simulados.length} feitos`} onClick={() => setView('simulados')}/>
        <QuickAction icon="pen" title="Treinar redação" desc={`${state.redacoes.length} produzidas`} onClick={() => setView('redacao')}/>
      </div>
    </div>
  );
}
function Card({ title, value, subtitle, color }) {

    <div className={`rounded-xl p-4 bg-gradient-to-br ${color} text-white shadow-md`}>
      <div className="text-xs uppercase tracking-wide opacity-90">{title}</div>
      <div className="text-3xl font-bold mt-1">{value}</div>
      <div className="text-xs mt-1 opacity-90">{subtitle}</div>

}
function QuickAction({ icon, title, desc, onClick }) {
  return (
    <button onClick={onClick} className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hover:border-emerald-400 hover:shadow-md transition text-left">

        <div>
          <div className="font-semibold text-slate-800">{title}</div>

// ===================== CRONOGRAMA =====================
function DiaDetalhe({ plano, state, setState }) {
  const [modalAdiar, setModalAdiar] = useState(null); // { ciclo, grupo_bloco, descricao_inicial }

  // Render especial para dias sem ciclos (domingos, sábados de simulado, etc)
  if (!plano.c1) {
    const pendencias = pendenciasDoDia(state, plano.id);
    return (
      <div className="space-y-3">
        <div className="text-slate-700 text-sm p-3 bg-slate-50 rounded border border-slate-200">
          <div className="font-semibold text-slate-800 mb-1">Atividade programada</div>
          {plano.atividade || 'Sem atividade'}
        </div>
        {pendencias.length > 0 && (
          <PendenciasAlocadas plano={plano} pendencias={pendencias} state={state} setState={setState}/>
        )}
      </div>
    );
  }

  const status = state.cronograma_status[plano.id] || {c1:'PENDENTE',c2:'PENDENTE',c3:'PENDENTE'};
  const setCicloStatus = (cic, novoStatus) => {
    setState(s => ({...s,
      cronograma_status: {...s.cronograma_status,
        [plano.id]: {...(s.cronograma_status[plano.id] || {c1:'PENDENTE',c2:'PENDENTE',c3:'PENDENTE'}), [cic]: novoStatus}
      }
    }));
  };
  const toggleCumprido = (cic) => setCicloStatus(cic, status[cic] === 'CUMPRIDO' ? 'PENDENTE' : 'CUMPRIDO');
  const abrirModalAdiar = (cic) => {
    const dadosCiclo = plano[cic];
    if (!dadosCiclo) return;
    const info = blocoInfo(dadosCiclo.grupo, dadosCiclo.bloco);
    setModalAdiar({
      ciclo: cic,
      grupo_bloco: `${dadosCiclo.grupo}-${dadosCiclo.bloco}`,
      disciplina: info?.disciplina || '',
      titulo_bloco: info?.titulo || info?.conteudo?.slice(0, 80) || '',
    });
  };
  const desfazerAdiamento = (cic) => {
    // Remove pendência associada e volta ciclo para PENDENTE
    setState(s => ({
      ...s,
      pendencias: (s.pendencias || []).filter(p => !(p.origem_dia_id === plano.id && p.ciclo === cic && !p.concluida)),
      cronograma_status: {...s.cronograma_status,
        [plano.id]: {...(s.cronograma_status[plano.id] || {c1:'PENDENTE',c2:'PENDENTE',c3:'PENDENTE'}), [cic]: 'PENDENTE'}
      }
    }));
  };
  const confirmarAdiamento = (descricao) => {
    if (!modalAdiar) return;
    const cic = modalAdiar.ciclo;
    const dadosCiclo = plano[cic];
    const destinoId = proximoDestinoPendencia(plano.data);
    const novaPendencia = {
      id: novoIdPendencia(),
      origem_dia_id: plano.id,
      origem_data: plano.data,
      ciclo: cic,
      grupo: dadosCiclo.grupo,
      bloco: dadosCiclo.bloco,
      descricao: descricao || '',
      alocada_para_dia_id: destinoId,
      criada_em: new Date().toISOString(),
      concluida: false,
    };
    setState(s => ({
      ...s,
      pendencias: [...(s.pendencias || []), novaPendencia],
      cronograma_status: {...s.cronograma_status,
        [plano.id]: {...(s.cronograma_status[plano.id] || {c1:'PENDENTE',c2:'PENDENTE',c3:'PENDENTE'}), [cic]: 'ADIADO'}
      }
    }));
    setModalAdiar(null);
  };

  const c1info = blocoInfo(plano.c1?.grupo, plano.c1?.bloco);
  const c2info = blocoInfo(plano.c2?.grupo, plano.c2?.bloco);
  const c3info = blocoInfo(plano.c3?.grupo, plano.c3?.bloco);
  return (
    <div className="space-y-3">
      <CicloBox cor="emerald" titulo="🟢 Ciclo 1 — Teoria (1h30)" info={c1info} grupo_bloco={`${plano.c1.grupo}-${plano.c1.bloco}`} status={status.c1}
        pendencia={(state.pendencias || []).find(p => p.origem_dia_id === plano.id && p.ciclo === 'c1' && !p.concluida)}
        onCumprir={() => toggleCumprido('c1')} onAdiar={() => abrirModalAdiar('c1')} onDesfazer={() => desfazerAdiamento('c1')}/>
      {c2info ? (
        <CicloBox cor="amber" titulo="🟡 Ciclo 2 — Lei seca focada (30 min)" info={c2info} grupo_bloco={`${plano.c2.grupo}-${plano.c2.bloco}`} status={status.c2}
          pendencia={(state.pendencias || []).find(p => p.origem_dia_id === plano.id && p.ciclo === 'c2' && !p.concluida)}
          onCumprir={() => toggleCumprido('c2')} onAdiar={() => abrirModalAdiar('c2')} onDesfazer={() => desfazerAdiamento('c2')} mostrarLei/>
      ) : <CicloVazio cor="amber" titulo="🟡 Ciclo 2 — Lei seca" texto="(primeiro dia — sem ciclo anterior)"/>}
      {c3info ? (
        <CicloBox cor="sky" titulo="🔵 Ciclo 3 — Questões (1h)" info={c3info} grupo_bloco={`${plano.c3.grupo}-${plano.c3.bloco}`} status={status.c3}
          pendencia={(state.pendencias || []).find(p => p.origem_dia_id === plano.id && p.ciclo === 'c3' && !p.concluida)}
          onCumprir={() => toggleCumprido('c3')} onAdiar={() => abrirModalAdiar('c3')} onDesfazer={() => desfazerAdiamento('c3')}/>
      ) : <CicloVazio cor="sky" titulo="🔵 Ciclo 3 — Questões" texto="(menos de 7 dias de estudo — ainda sem ciclo 3)"/>}

      {/* Pendências de outros dias alocadas para este dia (geralmente domingos) */}
      {pendenciasDoDia(state, plano.id).length > 0 && (
        <PendenciasAlocadas plano={plano} pendencias={pendenciasDoDia(state, plano.id)} state={state} setState={setState}/>
      )}

      {modalAdiar && (
        <ModalAdiarCiclo
          plano={plano}
          ciclo={modalAdiar}
          state={state}
          onConfirmar={confirmarAdiamento}
          onCancelar={() => setModalAdiar(null)}
        />
      )}
    </div>
  );
}
function CicloBox({ cor, titulo, info, grupo_bloco, status, pendencia, onCumprir, onAdiar, onDesfazer, mostrarLei }) {
  const bg = cor === 'emerald' ? 'bg-emerald-50 border-emerald-200' : cor === 'amber' ? 'bg-amber-50 border-amber-200' : 'bg-sky-50 border-sky-200';
  const ehAdiado = status === 'ADIADO';
  const ehTardio = status === 'CUMPRIDO_TARDIO';
  const ehCumprido = status === 'CUMPRIDO' || ehTardio;
  return (
    <div className={`border rounded-lg p-3 ${ehAdiado ? 'bg-violet-50 border-violet-200' : ehTardio ? 'bg-teal-50 border-teal-200' : bg}`}>
      <div className="flex items-start justify-between gap-3">
        <div className="flex-1 min-w-0">
          <div className="text-xs font-semibold text-slate-700 mb-1">{titulo}</div>
          <div className="text-sm font-medium text-slate-800">{grupo_bloco} · {info.disciplina}</div>
          <div className="text-xs text-slate-600 mt-1">{mostrarLei ? info.lei_seca : info.conteudo}</div>
          {ehAdiado && pendencia && (
            <div className="mt-2 text-xs text-violet-700 bg-violet-100 rounded px-2 py-1 inline-block">
              📅 Adiado para {fmtData(DADOS.cronograma.find(d => d.id === pendencia.alocada_para_dia_id)?.data)}
              {pendencia.descricao && <span className="block mt-0.5 italic">"{pendencia.descricao}"</span>}
            </div>
          )}
          {ehTardio && (
            <div className="mt-2 text-xs text-teal-700 bg-teal-100 rounded px-2 py-1 inline-block">
              ✓ Cumprido em atraso (originalmente adiado e concluído no domingo)
            </div>
          )}
        </div>
        <div className="flex-shrink-0 flex flex-col gap-1">
          {ehAdiado ? (
            <button onClick={onDesfazer} className="px-3 py-1.5 rounded-md text-xs font-semibold bg-white text-violet-700 border border-violet-300 hover:bg-violet-50">
              Desfazer adiamento
            </button>
          ) : (
            <>
              <button onClick={onCumprir} className={`px-3 py-1.5 rounded-md text-xs font-semibold transition ${ehCumprido ? (ehTardio ? 'bg-teal-600 text-white' : 'bg-emerald-600 text-white') : 'bg-white text-slate-700 border border-slate-300 hover:bg-slate-50'}`}>
                {ehTardio ? '✓ Cumprido (tardio)' : ehCumprido ? '✓ Cumprido' : 'Marcar cumprido'}
              </button>
              {!ehCumprido && (
                <button onClick={onAdiar} className="px-3 py-1 rounded-md text-xs bg-white text-violet-700 border border-violet-300 hover:bg-violet-50">
                  Adiar p/ domingo
                </button>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}
function CicloVazio({ cor, titulo, texto }) {
  return <div className="border rounded-lg p-3 bg-slate-50 border-slate-200 text-slate-500"><div className="text-xs font-semibold mb-1">{titulo}</div><div className="text-xs italic">{texto}</div></div>;
}

// Modal de confirmação ao adiar um ciclo para o próximo domingo de pendências
function ModalAdiarCiclo({ plano, ciclo, state, onConfirmar, onCancelar }) {
  const [descricao, setDescricao] = useState('');
  const destinoId = proximoDestinoPendencia(plano.data);
  const destino = destinoId != null ? DADOS.cronograma.find(d => d.id === destinoId) : null;
  // Quantas pendências já estão alocadas no destino?
  const cargaAtual = destino ? pendenciasDoDia(state, destinoId).length : 0;
  const sobrecarregado = cargaAtual >= 3;

  return (
    <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4" onClick={onCancelar}>
      <div className="bg-white rounded-xl shadow-xl max-w-md w-full p-5 fade-in" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-bold text-slate-800 text-lg mb-1">Adiar este ciclo?</h3>
        <p className="text-xs text-slate-500 mb-3">
          Você está adiando <strong>{ciclo.ciclo.toUpperCase()}</strong> ({ciclo.grupo_bloco} · {ciclo.disciplina}) de {fmtData(plano.data)} para o próximo domingo livre.
        </p>

        {!destino ? (
          <div className="mb-3 p-3 bg-red-50 border border-red-200 rounded text-xs text-red-800">
            ⚠ <strong>Sem destino disponível.</strong> Não há mais domingos de pendências no cronograma após esta data. A pendência será criada mas ficará sem alocação automática — visível no Dashboard.
          </div>
        ) : (
          <div className={`mb-3 p-3 rounded text-xs border ${sobrecarregado ? 'bg-amber-50 border-amber-200 text-amber-900' : 'bg-violet-50 border-violet-200 text-violet-900'}`}>
            📅 <strong>Destino:</strong> {destino.dia_sem} {fmtData(destino.data)} (id {destino.id})
            <div className="mt-1 text-slate-700">
              Carga atual desse dia: {cargaAtual} pendência{cargaAtual === 1 ? '' : 's'} já alocada{cargaAtual === 1 ? '' : 's'}.
              {sobrecarregado && <strong className="block text-amber-700">⚠ Domingo sobrecarregado — considere fazer hoje se possível.</strong>}
            </div>
          </div>
        )}

        <div className="mb-3 p-3 bg-slate-50 border border-slate-200 rounded text-xs text-slate-700">
          ⚠ <strong>Custo metodológico:</strong> adiar este ciclo desloca a revisão espaçada. O C3 deste bloco (questões 7 dias depois) parte do princípio de que a teoria/lei foi vista no dia certo. Use o adiamento como exceção.
        </div>

        <label className="block text-xs font-semibold text-slate-700 mb-1">Descrição do que ficou pendente (opcional)</label>
        <textarea
          value={descricao}
          onChange={(e) => setDescricao(e.target.value.slice(0, 200))}
          placeholder="Ex.: ler arts. 5º-12 da CF, parei no inciso XL"
          className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-violet-300 focus:outline-none"
          rows="2"
        />
        <div className="text-xs text-slate-400 text-right mb-3">{descricao.length}/200</div>

        <div className="flex gap-2 justify-end">
          <button onClick={onCancelar} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded">Cancelar</button>
          <button onClick={() => onConfirmar(descricao)} className="px-4 py-2 bg-violet-600 text-white text-sm font-semibold rounded hover:bg-violet-700">
            Confirmar adiamento
          </button>
        </div>
      </div>
    </div>
  );
}

// Lista de pendências alocadas para o dia (renderizada em domingos e no sábado de pendências)
function PendenciasAlocadas({ plano, pendencias, state, setState }) {
  const concluirPendencia = (idPend) => {
    setState(s => {
      const pend = (s.pendencias || []).find(p => p.id === idPend);
      if (!pend) return s;
      // Marca pendência como concluída E promove ciclo de origem para CUMPRIDO_TARDIO
      // (passa a contar no progresso, mas mantém marcador de que foi adiado)
      return {
        ...s,
        pendencias: (s.pendencias || []).map(p => p.id === idPend ? { ...p, concluida: true, concluida_em: new Date().toISOString() } : p),
        cronograma_status: {
          ...s.cronograma_status,
          [pend.origem_dia_id]: {
            ...(s.cronograma_status[pend.origem_dia_id] || {c1:'PENDENTE',c2:'PENDENTE',c3:'PENDENTE'}),
            [pend.ciclo]: 'CUMPRIDO_TARDIO'
          }
        }
      };
    });
  };
  const removerPendencia = (idPend) => {
    if (!confirm('Remover esta pendência sem marcar como concluída?')) return;
    setState(s => ({
      ...s,
      pendencias: (s.pendencias || []).filter(p => p.id !== idPend)
    }));
  };
  return (
    <div className="border border-violet-300 rounded-lg p-3 bg-violet-50">
      <div className="flex items-center justify-between mb-2">
        <div className="text-xs font-bold text-violet-900 uppercase tracking-wider">📥 Pendências alocadas para este dia ({pendencias.length})</div>
      </div>
      <div className="space-y-2">
        {pendencias.map(pend => {
          const info = blocoInfo(pend.grupo, pend.bloco);
          const origem = DADOS.cronograma.find(d => d.id === pend.origem_dia_id);
          return (
            <div key={pend.id} className="bg-white rounded border border-violet-200 p-2 text-sm">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-slate-800">
                    {pend.ciclo.toUpperCase()} · {pend.grupo}-{pend.bloco} · {info?.disciplina || '—'}
                  </div>
                  <div className="text-xs text-slate-500 mt-0.5">
                    Vindo de {origem ? fmtData(origem.data) : '—'} ({origem?.dia_sem})
                  </div>
                  {pend.descricao && (
                    <div className="text-xs text-slate-700 italic mt-1 bg-violet-50 px-2 py-1 rounded">"{pend.descricao}"</div>
                  )}
                </div>
                <div className="flex flex-col gap-1 flex-shrink-0">
                  <button onClick={() => concluirPendencia(pend.id)} className="px-3 py-1 bg-emerald-600 text-white text-xs rounded hover:bg-emerald-700 font-semibold">
                    ✓ Concluir
                  </button>
                  <button onClick={() => removerPendencia(pend.id)} className="px-3 py-1 bg-white text-slate-500 text-xs rounded border border-slate-200 hover:bg-slate-50">
                    Remover
                  </button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

        <div className="flex flex-wrap gap-2">
          {todasSemanas.map(s => (
            <button key={s} onClick={() => setSemanaIdx(s-1)}

              Sem {s}
            </button>
          ))}
        </div>
      </div>
      <div className="space-y-4">
        {semanaAtual.map(plano => (
          <div key={plano.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="bg-gradient-to-r from-slate-700 to-slate-600 text-white px-4 py-2 flex items-center justify-between">
              <div>
                <span className="font-bold">{plano.dia_sem}</span>
                <span className="mx-2 opacity-50">·</span>
                <span className="text-sm">{fmtData(plano.data)}</span>
              </div>
              <span className="text-xs bg-white/20 px-2 py-0.5 rounded">{plano.tipo}</span>
            </div>
            <div className="p-4">
              {plano.tipo === 'Prova' ? (
                <div className="text-center py-6 bg-red-50 rounded-lg">
                  <div className="text-3xl mb-2">🏆</div>
                  <div className="text-xl font-bold text-red-800">PROVA TJ-CE 2026</div>
                  <div className="text-sm text-red-600 mt-1">Manhã · 4 horas</div>

              ) : (
                <DiaDetalhe plano={plano} state={state} setState={setState}/>

        ))}
      </div>
    </div>
  );
}

function Questoes({ state, setState }) {
  const [filtroDisciplina, setFiltroDisciplina] = useState('TODAS');
  const [filtroStatus, setFiltroStatus] = useState('TODAS');
  const [modal, setModal] = useState(null);
  const todasQuestoes = [...DADOS.questoes, ...state.questoes_custom];
  const disciplinas = [...new Set(todasQuestoes.map(q => q.disciplina))];
  const filtradas = todasQuestoes.filter(q => {
    if (filtroDisciplina !== 'TODAS' && q.disciplina !== filtroDisciplina) return false;
    const respondida = !!state.questoes_estado[q.id];
    if (filtroStatus === 'RESPONDIDAS' && !respondida) return false;
    if (filtroStatus === 'PENDENTES' && respondida) return false;
    if (filtroStatus === 'ERRADAS' && (!respondida || state.questoes_estado[q.id].acertou)) return false;
    if (filtroStatus === 'DESCALIBRADAS') {
      const r = state.questoes_estado[q.id];
      if (!r) return false;
      // descalibrada = marcou certeza mas errou
      if (!(r.confianca === 'certo' && !r.acertou)) return false;
    }
    return true;
  });
  const responder = (questao, alternativa, confianca) => {
    const acertou = alternativa === questao.gabarito;
    setState(s => ({...s, questoes_estado: {...s.questoes_estado, [questao.id]: {
      alternativa_marcada: alternativa,
      acertou,
      confianca: confianca || 'nao_declarada',
      data_resposta: new Date().toISOString()
    }}}));
  };
  const limparResposta = (id) => {
    setState(s => { const novo = {...s.questoes_estado}; delete novo[id]; return {...s, questoes_estado: novo}; });
  };
  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">Banco de Questões</h2>
      <p className="text-slate-500 mb-2">{todasQuestoes.length} questões no estilo FCC. Clique para responder.</p>
      <p className="text-xs text-slate-400 mb-5 italic">Questões elaboradas no estilo da banca FCC para fins de estudo (não são cópias oficiais).</p>
      <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4 flex flex-wrap gap-3 items-center">
        <div className="flex items-center gap-2">
          <label className="text-xs font-semibold text-slate-600">Disciplina:</label>
          <select value={filtroDisciplina} onChange={e => setFiltroDisciplina(e.target.value)} className="text-sm border rounded px-2 py-1 ring-focus">
            <option value="TODAS">Todas</option>
            {disciplinas.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <div className="flex items-center gap-2">
          <label className="text-xs font-semibold text-slate-600">Status:</label>
          <select value={filtroStatus} onChange={e => setFiltroStatus(e.target.value)} className="text-sm border rounded px-2 py-1 ring-focus">
            <option value="TODAS">Todas</option>
            <option value="PENDENTES">Pendentes</option>
            <option value="RESPONDIDAS">Respondidas</option>
            <option value="ERRADAS">Erradas</option>
            <option value="DESCALIBRADAS">Descalibradas (certeza → errou)</option>
          </select>
        </div>
        <div className="ml-auto text-xs text-slate-500">{filtradas.length} questões</div>
      </div>
      <div className="space-y-3">
        {filtradas.map(q => {
          const resp = state.questoes_estado[q.id];
          return (
            <div key={q.id} className={`bg-white rounded-xl shadow-sm border p-4 transition cursor-pointer ${resp ? (resp.acertou ? 'border-emerald-300' : 'border-red-300') : 'border-slate-200 hover:border-emerald-300'}`}
                 onClick={() => setModal(q)}>
              <div className="flex items-start justify-between gap-3 mb-2">
                <div className="flex flex-wrap items-center gap-2 text-xs">
                  <span className="font-bold text-slate-500">#{q.id}</span>
                  <span className="px-2 py-0.5 bg-slate-100 text-slate-700 rounded">{q.disciplina}</span>
                  <span className="px-2 py-0.5 bg-slate-100 text-slate-700 rounded">{q.bloco}</span>
                  <span className={`px-2 py-0.5 rounded ${q.nivel === 'fácil' ? 'bg-green-100 text-green-700' : q.nivel === 'difícil' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>{q.nivel}</span>
                </div>
                {resp && (<span className={`text-xs font-bold ${resp.acertou ? 'text-emerald-700' : 'text-red-700'}`}>{resp.acertou ? '✓ Acertou' : '✗ Errou'}</span>)}
              </div>
              <p className="text-sm text-slate-800 line-clamp-2">{q.enunciado}</p>
            </div>
          );
        })}
      </div>
      {modal && (
        <ModalQuestao questao={modal} resposta={state.questoes_estado[modal.id]} onClose={() => setModal(null)}
          onResponder={(alt, conf) => responder(modal, alt, conf)} onLimpar={() => limparResposta(modal.id)} state={state} setState={setState}/>
      )}
    </div>
  );
}
function ModalQuestao({ questao, resposta, onClose, onResponder, onLimpar, state, setState }) {
  const respondida = !!resposta;
  const [confianca, setConfianca] = useState(resposta?.confianca || null);
  const CONF_LABEL = { certo: 'Tenho certeza', duvida: 'Em dúvida', chute: 'Chutei' };
  const CONF_COR = {
    certo: 'bg-emerald-100 text-emerald-800 border-emerald-400',
    duvida: 'bg-amber-100 text-amber-800 border-amber-400',
    chute: 'bg-slate-100 text-slate-700 border-slate-400'
  };
  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 fade-in" onClick={onClose}>
      <div className="bg-white rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b p-4 flex items-center justify-between">
          <div className="flex items-center gap-2 text-xs">
            <span className="font-bold text-slate-700">Questão #{questao.id}</span>
            <span className="px-2 py-0.5 bg-slate-100 rounded">{questao.disciplina}</span>
            <span className="px-2 py-0.5 bg-slate-100 rounded">{questao.bloco}</span>
          </div>
          <button onClick={onClose} className="p-1 hover:bg-slate-100 rounded"><Icon name="x" className="w-5 h-5"/></button>
        </div>
        <div className="p-5">
          <p className="text-slate-800 mb-4">{questao.enunciado}</p>

          {!respondida && (
            <div className="mb-4 p-3 bg-slate-50 border border-slate-200 rounded-lg">
              <div className="text-xs font-semibold text-slate-700 mb-2">
                1️⃣ Antes de marcar a alternativa, declare sua confiança:
              </div>
              <div className="grid grid-cols-3 gap-2">
                {['certo','duvida','chute'].map(c => (
                  <button key={c} onClick={() => setConfianca(c)}
                    className={`text-xs font-semibold py-2 rounded border-2 transition ${confianca === c ? CONF_COR[c] : 'border-slate-200 bg-white text-slate-500 hover:border-slate-400'}`}>
                    {CONF_LABEL[c]}
                  </button>
                ))}
              </div>
              {confianca && (
                <div className="text-[11px] text-slate-500 mt-2">
                  ✓ Confiança registrada como <strong>{CONF_LABEL[confianca]}</strong>. Agora escolha a alternativa.
                </div>
              )}
            </div>
          )}

          {respondida && resposta.confianca && resposta.confianca !== 'nao_declarada' && (
            <div className="mb-3 text-xs">
              Confiança declarada: <span className={`px-2 py-0.5 rounded border ${CONF_COR[resposta.confianca]}`}>
                {CONF_LABEL[resposta.confianca]}
              </span>
              {resposta.confianca === 'certo' && !resposta.acertou && (
                <span className="ml-2 text-red-700 font-semibold">⚠ Descalibração: tinha certeza, mas errou</span>
              )}
            </div>
          )}

          <div className="space-y-2">
            {Object.entries(questao.alternativas).map(([letra, texto]) => {
              const isCerta = letra === questao.gabarito;
              const isMarcada = resposta?.alternativa_marcada === letra;
              const podeResponder = !respondida && !!confianca;
              let classe = "border-slate-200";
              if (respondida) {
                if (isCerta) classe = "border-emerald-500 bg-emerald-50";
                else if (isMarcada) classe = "border-red-500 bg-red-50";
                else classe = "border-slate-200 opacity-60";
              } else if (podeResponder) {
                classe = "border-slate-200 hover:border-emerald-300";
              } else {
                classe = "border-slate-200 opacity-50";
              }
              return (
                <button key={letra} onClick={() => podeResponder && onResponder(letra, confianca)} disabled={!podeResponder}
                  className={`w-full text-left border rounded-lg p-3 transition ${classe} ${podeResponder ? 'cursor-pointer' : 'cursor-default'}`}>
                  <div className="flex items-start gap-3">
                    <span className={`font-bold flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${respondida && isCerta ? 'bg-emerald-600 text-white' : respondida && isMarcada ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-700'}`}>{letra}</span>
                    <span className="text-sm text-slate-800 pt-1">{texto}</span>
                  </div>
                </button>
              );
            })}
          </div>
          {!respondida && !confianca && (
            <p className="text-[11px] text-slate-400 mt-2 italic">Declare a confiança acima para liberar as alternativas.</p>
          )}
          {respondida && (
            <div className="mt-5 p-4 bg-slate-50 border border-slate-200 rounded-lg">
              <div className="flex items-center justify-between mb-2">
                <div className="font-bold text-slate-800">{resposta.acertou ? '✅ Você acertou!' : `❌ Resposta correta: ${questao.gabarito}`}</div>
                <button onClick={() => { setConfianca(null); onLimpar(); }} className="text-xs text-slate-500 hover:text-slate-700 underline">Refazer questão</button>
              </div>
              <p className="text-sm text-slate-700"><strong>Comentário:</strong> {questao.explicacao}</p>
              {!resposta.acertou && (
                <button onClick={() => {
                  setState(s => ({...s, apostas_erros: [...s.apostas_erros, {
                    id: Date.now(), data: hoje(),
                    tipo: 'erro', origem: 'banco_interno',
                    disciplina: questao.disciplina,
                    grupo: questao.grupo, bloco: questao.bloco,
                    descricao: questao.explicacao,
                    contexto: questao.enunciado.substring(0, 100) + '...',
                    questao_id: questao.id
                  }]}));
                  alert('Erro adicionado ao Quadro de Apostas e Erros');
                }} className="mt-3 text-xs px-3 py-1.5 bg-orange-100 text-orange-800 rounded hover:bg-orange-200">
                  🔥 Salvar no Quadro de Apostas e Erros
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Simulados({ state, setState }) {
  const [emAndamento, setEmAndamento] = useState(null);
  const iniciarSimulado = () => {
    const pool = [...DADOS.questoes, ...state.questoes_custom];
    const sorteadas = [...pool].sort(() => 0.5 - Math.random()).slice(0, Math.min(20, pool.length));
    setEmAndamento({ id: Date.now(), iniciado_em: new Date().toISOString(),
      questoes: sorteadas, respostas: {}, tempo_inicio: Date.now()});
  };
  const finalizar = () => {
    if (!emAndamento) return;
    const acertos = emAndamento.questoes.filter(q => emAndamento.respostas[q.id] === q.gabarito).length;
    const total = emAndamento.questoes.length;
    const tempo = Math.floor((Date.now() - emAndamento.tempo_inicio) / 1000 / 60);
    const sim = { id: emAndamento.id, data: hoje(), questoes_ids: emAndamento.questoes.map(q => q.id),
      respostas: emAndamento.respostas, acertos, total, pct: Math.round(acertos/total*100), tempo_minutos: tempo };
    setState(s => ({...s, simulados: [...s.simulados, sim]}));
    setEmAndamento(null);
  };
  if (emAndamento) return <SimuladoEmCurso simulado={emAndamento} setSimulado={setEmAndamento} onFinalizar={finalizar}/>;
  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">Simulados</h2>
      <p className="text-slate-500 mb-5">Aplique simulados cronometrados com 20 questões aleatórias. Recomendado a partir da Semana 8.</p>
      <div className="bg-gradient-to-br from-emerald-600 to-emerald-800 rounded-xl p-6 text-white mb-6">
        <h3 className="text-xl font-bold mb-2">🎯 Aplicar novo simulado</h3>
        <p className="text-emerald-100 text-sm mb-4">20 questões sorteadas · Cronometrado · Sem feedback durante a prova</p>
        <button onClick={iniciarSimulado} className="px-5 py-2 bg-white text-emerald-800 font-bold rounded-lg hover:bg-emerald-50 transition">Iniciar simulado</button>
      </div>
      <h3 className="font-bold text-slate-800 mb-3">📊 Histórico</h3>
      {state.simulados.length === 0 ? (
        <div className="bg-white rounded-xl p-6 text-center text-slate-500">Nenhum simulado realizado ainda.</div>
      ) : (
        <div className="space-y-2">
          {[...state.simulados].reverse().map(s => (
            <div key={s.id} className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center justify-between">
              <div>
                <div className="font-semibold text-slate-800">Simulado #{s.id.toString().slice(-4)}</div>
                <div className="text-xs text-slate-500">{fmtData(s.data)} · {s.tempo_minutos} min</div>
              </div>
              <div className="text-right">
                <div className={`text-2xl font-bold ${s.pct >= 70 ? 'text-emerald-600' : s.pct >= 50 ? 'text-amber-600' : 'text-red-600'}`}>{s.pct}%</div>
                <div className="text-xs text-slate-500">{s.acertos}/{s.total} acertos</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
function SimuladoEmCurso({ simulado, setSimulado, onFinalizar }) {
  const [idx, setIdx] = useState(0);
  const [tempo, setTempo] = useState(0);
  useEffect(() => { const t = setInterval(() => setTempo(t => t + 1), 1000); return () => clearInterval(t); }, []);
  const q = simulado.questoes[idx];
  const responder = (letra) => { setSimulado(s => ({...s, respostas: {...s.respostas, [q.id]: letra}})); };
  const respondidas = Object.keys(simulado.respostas).length;
  const minutos = Math.floor(tempo / 60), segundos = tempo % 60;
  return (
    <div>
      <div className="bg-slate-800 text-white rounded-xl p-4 mb-4 flex items-center justify-between sticky top-0 z-10">
        <div>
          <div className="text-xs opacity-70">SIMULADO EM ANDAMENTO</div>
          <div className="font-bold">Questão {idx + 1} de {simulado.questoes.length}</div>
        </div>
        <div className="flex items-center gap-4">
          <div className="text-center"><div className="text-xs opacity-70">Tempo</div><div className="font-mono font-bold">{String(minutos).padStart(2,'0')}:{String(segundos).padStart(2,'0')}</div></div>
          <div className="text-center"><div className="text-xs opacity-70">Respondidas</div><div className="font-bold">{respondidas}/{simulado.questoes.length}</div></div>
          <button onClick={() => { if(confirm('Encerrar e ver resultado?')) onFinalizar(); }} className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded font-semibold">Finalizar</button>
        </div>
      </div>
      <div className="bg-white rounded-xl shadow border p-5">
        <div className="text-xs text-slate-500 mb-2">{q.disciplina} · {q.bloco}</div>
        <p className="text-slate-800 mb-4">{q.enunciado}</p>
        <div className="space-y-2">
          {Object.entries(q.alternativas).map(([letra, texto]) => {
            const marcada = simulado.respostas[q.id] === letra;
            return (
              <button key={letra} onClick={() => responder(letra)}
                className={`w-full text-left border rounded-lg p-3 transition ${marcada ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200 hover:border-emerald-300'}`}>
                <div className="flex items-start gap-3">
                  <span className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold ${marcada ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-700'}`}>{letra}</span>
                  <span className="text-sm text-slate-800 pt-1">{texto}</span>
                </div>
              </button>
            );
          })}
        </div>
      </div>
      <div className="flex justify-between mt-4">
        <button onClick={() => setIdx(Math.max(0, idx - 1))} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-300 rounded disabled:opacity-50">← Anterior</button>
        <button onClick={() => setIdx(Math.min(simulado.questoes.length - 1, idx + 1))} disabled={idx === simulado.questoes.length - 1} className="px-4 py-2 bg-emerald-600 text-white rounded disabled:opacity-50">Próxima →</button>
      </div>
      <div className="mt-4 grid grid-cols-10 gap-1">
        {simulado.questoes.map((q, i) => (
          <button key={i} onClick={() => setIdx(i)}
            className={`aspect-square rounded text-xs font-bold ${i === idx ? 'bg-emerald-600 text-white' : simulado.respostas[q.id] ? 'bg-emerald-200 text-emerald-800' : 'bg-slate-200 text-slate-600'}`}>{i+1}</button>
        ))}
      </div>
    </div>
  );
}

// ===================== DESEMPENHO =====================
function Desempenho({ state }) {
  const todasQuestoes = [...DADOS.questoes, ...state.questoes_custom];
  const porDisciplina = {};
  Object.entries(state.questoes_estado).forEach(([qid, est]) => {
    const q = todasQuestoes.find(qu => String(qu.id) === qid); if (!q) return;
    if (!porDisciplina[q.disciplina]) porDisciplina[q.disciplina] = {total:0, acertos:0};
    porDisciplina[q.disciplina].total++;
    if (est.acertou) porDisciplina[q.disciplina].acertos++;
  });
  const respTotal = Object.keys(state.questoes_estado).length;
  const acertosTotal = Object.values(state.questoes_estado).filter(q => q.acertou).length;
  const pctGeral = respTotal ? Math.round(acertosTotal/respTotal*100) : 0;
  const simulados = state.simulados;
  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">Desempenho</h2>
      <p className="text-slate-500 mb-5">Estatísticas por disciplina e simulados.</p>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <Card title="Questões respondidas" value={respTotal} subtitle="no banco" color="from-blue-500 to-indigo-600"/>
        <Card title="% Acerto geral" value={`${pctGeral}%`} subtitle={`${acertosTotal}/${respTotal}`} color="from-emerald-500 to-green-600"/>
        <Card title="Simulados aplicados" value={simulados.length} subtitle={simulados.length > 0 ? `Última: ${simulados[simulados.length-1].pct}%` : '—'} color="from-purple-500 to-pink-500"/>
      </div>
      <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
        <h3 className="font-bold text-slate-800 mb-4">📊 Por disciplina</h3>
        {Object.keys(porDisciplina).length === 0 ? (
          <p className="text-slate-500 text-sm">Responda questões para ver estatísticas.</p>
        ) : (
          <div className="space-y-3">
            {Object.entries(porDisciplina).sort((a,b) => b[1].total - a[1].total).map(([disc, st]) => {
              const pct = Math.round(st.acertos / st.total * 100);
              const cor = pct >= 70 ? 'bg-emerald-500' : pct >= 50 ? 'bg-amber-500' : 'bg-red-500';
              return (
                <div key={disc}>
                  <div className="flex justify-between text-sm mb-1"><span className="font-medium text-slate-700">{disc}</span><span className="text-slate-600">{st.acertos}/{st.total} · {pct}%</span></div>
                  <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden"><div className={`h-full ${cor} transition-all`} style={{width: `${pct}%`}}/></div>
                </div>
              );
            })}
          </div>
        )}
      </div>
      {simulados.length > 0 && (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
          <h3 className="font-bold text-slate-800 mb-4">📈 Evolução em simulados</h3>
          <div className="flex items-end gap-2 h-40">
            {simulados.map((s, i) => {
              const altura = Math.max(10, s.pct);
              const cor = s.pct >= 70 ? 'bg-emerald-500' : s.pct >= 50 ? 'bg-amber-500' : 'bg-red-500';
              return (<div key={s.id} className="flex-1 flex flex-col items-center"><div className="text-xs font-bold mb-1">{s.pct}%</div><div className={`w-full ${cor} rounded-t transition-all`} style={{height: `${altura}%`}}/><div className="text-[10px] text-slate-500 mt-1">#{i+1}</div></div>);
            })}
          </div>
        </div>
      )}
      <BlocoCalibracao state={state}/>
    </div>
  );
}

// Calibração: cruza confiança declarada x acerto efetivo
function BlocoCalibracao({ state }) {
  const buckets = {
    certo:  { total: 0, acertos: 0, label: 'Tinha certeza' },
    duvida: { total: 0, acertos: 0, label: 'Em dúvida' },
    chute:  { total: 0, acertos: 0, label: 'Chutei' },
  };
  let semConf = 0;
  Object.values(state.questoes_estado).forEach(r => {
    if (!r.confianca || r.confianca === 'nao_declarada') { semConf++; return; }
    if (buckets[r.confianca]) {
      buckets[r.confianca].total++;
      if (r.acertou) buckets[r.confianca].acertos++;
    }
  });
  const totalDeclaradas = Object.values(buckets).reduce((a, b) => a + b.total, 0);
  if (totalDeclaradas === 0) {
    return (
      <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mt-6">
        <h3 className="font-bold text-slate-800 mb-2">🎯 Calibração de Confiança</h3>
        <p className="text-sm text-slate-500">
          Declare sua confiança ao responder questões no Banco para ver aqui se você tem
          tendência a superestimar (ou subestimar) seu conhecimento — o sinal mais útil para corrigir
          premissas erradas antes da prova.
        </p>
      </div>
    );
  }
  const descalibradas = buckets.certo.total - buckets.certo.acertos;
  return (
    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mt-6">
      <div className="flex items-baseline justify-between mb-3">
        <h3 className="font-bold text-slate-800">🎯 Calibração de Confiança</h3>
        {semConf > 0 && <span className="text-[11px] text-slate-400">{semConf} questões sem confiança declarada</span>}
      </div>
      <p className="text-xs text-slate-500 mb-4">
        % de acerto cruzado com a confiança que você declarou ANTES de responder. Quanto mais alto o acerto
        nas que "tinha certeza", melhor sua calibração. <strong>Errar com certeza é o erro mais caro</strong>:
        indica premissa equivocada que tende a se repetir.
      </p>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        {['certo','duvida','chute'].map(k => {
          const b = buckets[k];
          const pct = b.total ? Math.round(b.acertos / b.total * 100) : 0;
          const CORES = {
            certo:  { bg: 'bg-emerald-50', border: 'border-emerald-200', t1: 'text-emerald-800', t2: 'text-emerald-900', t3: 'text-emerald-700' },
            duvida: { bg: 'bg-amber-50',   border: 'border-amber-200',   t1: 'text-amber-800',   t2: 'text-amber-900',   t3: 'text-amber-700' },
            chute:  { bg: 'bg-slate-50',   border: 'border-slate-200',   t1: 'text-slate-800',   t2: 'text-slate-900',   t3: 'text-slate-700' },
          };
          const c = CORES[k];
          return (
            <div key={k} className={`p-3 rounded-lg border ${c.bg} ${c.border}`}>
              <div className={`text-[11px] font-semibold ${c.t1}`}>{b.label}</div>
              <div className={`text-2xl font-bold ${c.t2} mt-1`}>{b.total ? pct + '%' : '—'}</div>
              <div className={`text-[11px] ${c.t3} mt-0.5`}>{b.acertos}/{b.total} acertos</div>
            </div>
          );
        })}
      </div>
      {descalibradas > 0 && (
        <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm">
          <strong className="text-red-800">⚠ {descalibradas} questão{descalibradas > 1 ? 'ões descalibradas' : ' descalibrada'}</strong>
          <span className="text-red-700"> (tinha certeza, mas errou). </span>
          <span className="text-red-700">Filtre por <em>Descalibradas</em> no Banco de Questões para revisar essas premissas com prioridade.</span>
        </div>
      )}
      {buckets.certo.total >= 5 && (() => {
        const pctCerto = buckets.certo.acertos / buckets.certo.total;
        if (pctCerto >= 0.9) return <p className="text-xs text-emerald-700 mt-2">✓ Calibração saudável: quando declara certeza, acerta {Math.round(pctCerto*100)}%.</p>;
        if (pctCerto < 0.7) return <p className="text-xs text-red-700 mt-2">⚠ Excesso de confiança: você declara certeza mas só acerta {Math.round(pctCerto*100)}%. Revise critério de "ter certeza".</p>;
        return null;
      })()}
    </div>
  );
}

// ===================== REDAÇÃO (com sistema de correção) =====================
function Redacao({ state, setState }) {
  const [tela, setTela] = useState('lista'); // lista | treinar | corrigir | ver
  const [temaAtual, setTemaAtual] = useState(null);
  const [redacaoSelecionada, setRedacaoSelecionada] = useState(null);
  const [texto, setTexto] = useState('');
  const [tempoInicio, setTempoInicio] = useState(null);
  
  const iniciarTreino = (tema) => {
    setTemaAtual(tema); setTexto(''); setTempoInicio(Date.now()); setTela('treinar');
  };
  const enviarParaCorrecao = () => {
    const tempoMin = tempoInicio ? Math.round((Date.now() - tempoInicio) / 60000) : 0;
    setTela('corrigir');
  };
  const salvarRedacao = (notaFinal, checklist) => {
    const tempoMin = tempoInicio ? Math.round((Date.now() - tempoInicio) / 60000) : 0;
    const analise = analisarTexto(texto);
    const nova = {
      id: Date.now(), data: hoje(),
      tema_id: temaAtual.id, tema_titulo: temaAtual.titulo, eixo: temaAtual.eixo,
      texto, tempo: tempoMin,
      linhas: analise?.linhasEstimadas || 0,
      palavras: analise?.numPalavras || 0,
      nota: notaFinal, checklist
    };
    setState(s => ({...s, redacoes: [...s.redacoes, nova]}));
    setTela('lista'); setTexto(''); setTemaAtual(null);
  };
  
  if (tela === 'treinar') {
    return <TelaTreinarRedacao tema={temaAtual} texto={texto} setTexto={setTexto} 
      onEnviar={enviarParaCorrecao} onCancelar={() => { if(confirm('Descartar redação?')) { setTela('lista'); setTexto(''); }}}/>;
  }
  if (tela === 'corrigir') {
    return <TelaCorrigirRedacao tema={temaAtual} texto={texto}
      onVoltar={() => setTela('treinar')} onSalvar={salvarRedacao}/>;
  }
  if (tela === 'ver' && redacaoSelecionada) {
    return <TelaVerRedacao redacao={redacaoSelecionada}
      onVoltar={() => { setTela('lista'); setRedacaoSelecionada(null); }}
      onExcluir={() => { if(confirm('Excluir?')) { 
        setState(s => ({...s, redacoes: s.redacoes.filter(r => r.id !== redacaoSelecionada.id)}));
        setTela('lista'); setRedacaoSelecionada(null);
      }}}/>;
  }
  
  return (
    <div>
      <h2 className="text-3xl font-bold text-slate-800 mb-1">Redação</h2>
      <p className="text-slate-500 mb-5">Treino da prova discursiva. Sistema de correção automática + checklist FCC + espelho de resposta.</p>
      <div className="bg-amber-50 border border-amber-300 rounded-xl p-4 mb-5 text-sm text-amber-900">
        <strong>📝 Critérios FCC:</strong> Tema (7 pts: recorte temático 2 + interpretação 2 + progressão 3) + Norma-padrão (3 pts: vocabulário 0,8 + coesão 1,6 + morfossintaxe 0,6).
      </div>
      <h3 className="font-bold text-slate-800 mb-3">🎯 Temas com espelho de resposta ({DADOS.temas_redacao.length})</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
        {DADOS.temas_redacao.map(t => {
          const jaFeitas = state.redacoes.filter(r => r.tema_id === t.id).length;
          return (
            <div key={t.id} className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 hover:border-emerald-400 transition flex flex-col">
              <div className="text-xs text-emerald-700 font-semibold mb-1">{t.eixo}</div>
              <div className="font-semibold text-slate-800 mb-2">{t.titulo}</div>
              <div className="text-xs text-slate-600 mb-3 flex-1">{t.abordagem}</div>
              <div className="flex items-center justify-between gap-2">
                {jaFeitas > 0 && <span className="text-xs text-emerald-700">✓ {jaFeitas}×</span>}
                <button onClick={() => iniciarTreino(t)} className="ml-auto text-xs px-3 py-1.5 bg-emerald-600 text-white rounded hover:bg-emerald-700 font-medium">
                  ✍️ Treinar este tema
                </button>
              </div>
            </div>
          );
        })}
      </div>
      <h3 className="font-bold text-slate-800 mb-3">📚 Minhas redações ({state.redacoes.length})</h3>
      {state.redacoes.length === 0 ? (
        <div className="bg-white rounded-xl p-6 text-center text-slate-500">Nenhuma redação produzida ainda.</div>
      ) : (
        <div className="space-y-2">
          {[...state.redacoes].reverse().map(r => (
            <div key={r.id} className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center justify-between cursor-pointer hover:border-emerald-300"
                 onClick={() => { setRedacaoSelecionada(r); setTela('ver'); }}>
              <div className="flex-1">
                <div className="font-medium text-slate-800 line-clamp-1">{r.tema_titulo}</div>
                <div className="text-xs text-slate-500 mt-1">{fmtData(r.data)} · {r.linhas} linhas · {r.palavras} palavras · {r.tempo} min</div>
              </div>
              <div className={`text-2xl font-bold ml-3 ${r.nota >= 7 ? 'text-emerald-600' : r.nota >= 6 ? 'text-amber-600' : 'text-red-600'}`}>{r.nota?.toFixed(1) || '—'}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const minutos = Math.floor(tempoDecorrido / 60), segundos = tempoDecorrido % 60;
  return (
    <div>
      <div className="bg-emerald-700 text-white rounded-xl p-4 mb-4 flex items-center justify-between sticky top-0 z-10">
        <div className="flex-1 min-w-0">
          <div className="text-xs opacity-80">TREINANDO REDAÇÃO</div>
          <div className="font-bold line-clamp-1">{tema.titulo}</div>
        </div>
        <div className="flex items-center gap-4 flex-shrink-0">
          <div className="text-center"><div className="text-xs opacity-80">Tempo</div><div className="font-mono font-bold">{String(minutos).padStart(2,'0')}:{String(segundos).padStart(2,'0')}</div></div>
          <button onClick={onCancelar} className="px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded text-sm">Cancelar</button>

      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 bg-white rounded-xl shadow border p-4">
          <div className="mb-3 text-xs text-slate-500 bg-slate-50 p-2 rounded">
            <strong>Tema:</strong> {tema.titulo}<br/>
            <strong>Abordagem:</strong> {tema.abordagem}

          <textarea value={texto} onChange={e => setTexto(e.target.value)}

        </div>
        <div className="bg-white rounded-xl shadow border p-4 space-y-3">
          <h3 className="font-bold text-slate-800 text-sm border-b pb-2">📊 Métricas em tempo real</h3>

            <>
              <Metrica label="Palavras" valor={analise.numPalavras} ideal="170-255"/>
              <Metrica label="Linhas estimadas" valor={analise.linhasEstimadas} ideal="20-30"

        </div>

}
function Metrica({ label, valor, ideal, cor = 'slate' }) {

          <Icon name="save" className="w-4 h-4"/>

  );
